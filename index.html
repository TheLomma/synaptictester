<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--ease:all 0.3s cubic-bezier(0.25,0.46,0.45,0.94);
--glass-bg:rgba(0,0,0,0.45);
--glass-border:rgba(255,255,255,0.10);
--glass-shadow:0 8px 40px rgba(0,0,0,0.7);
--glass-blur:blur(28px) saturate(160%);
--glass-btn:rgba(255,255,255,0.08);
--glass-btn-hover:rgba(255,255,255,0.14);
--glass-input:rgba(255,255,255,0.06);
--glass-display:rgba(0,0,0,0.45);
--text:rgba(255,255,255,0.92);
--text-light:rgba(255,255,255,0.40);
--accent:#4dabf7;
--red:#ff6b6b;
--green:#51cf66;
--tab-active:rgba(255,255,255,0.12);
}
body.light-mode{
--glass-bg:rgba(255,255,255,0.12);
--glass-border:rgba(255,255,255,0.15);
--glass-shadow:0 8px 40px rgba(0,0,0,0.4);
--glass-btn:rgba(255,255,255,0.10);
--glass-btn-hover:rgba(255,255,255,0.18);
--glass-input:rgba(255,255,255,0.08);
--glass-display:rgba(255,255,255,0.08);
--text:rgba(255,255,255,0.95);
--text-light:rgba(255,255,255,0.55);
--tab-active:rgba(255,255,255,0.15);
background:radial-gradient(ellipse at 20% 20%,#1a3a6e 0%,transparent 55%),radial-gradient(ellipse at 80% 10%,#2a1a5e 0%,transparent 50%),linear-gradient(135deg,#0f1f3d 0%,#1a1030 50%,#0f1f3d 100%);
}
body{
font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;
padding:40px 20px 60px;
background:radial-gradient(ellipse at 20% 20%,#0d3a7a 0%,transparent 55%),radial-gradient(ellipse at 80% 10%,#2d0a6e 0%,transparent 50%),radial-gradient(ellipse at 60% 80%,#04385a 0%,transparent 50%),linear-gradient(135deg,#030810 0%,#060f22 50%,#030810 100%);
}
.app-container{width:100%;max-width:580px;background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border);border-radius:28px;box-shadow:var(--glass-shadow),inset 0 1px 0 rgba(255,255,255,0.3);overflow:hidden;transition:var(--ease);}
.app-header{display:flex;justify-content:space-between;align-items:center;padding:18px 24px 14px;background:rgba(0,0,0,0.35);border-bottom:1px solid rgba(255,255,255,0.07);}
.app-header span{font-size:17px;font-weight:600;color:var(--text);letter-spacing:-0.3px;}
#theme-toggle{min-width:80px;text-align:center;background:var(--glass-btn);border:1px solid var(--glass-border);border-radius:20px;color:var(--text);padding:6px 14px;font-size:13px;font-weight:500;cursor:pointer;backdrop-filter:blur(10px);transition:var(--ease);}
#theme-toggle:hover{background:var(--glass-btn-hover);}
.tabs{display:flex;background:rgba(0,0,0,0.35);border-bottom:1px solid rgba(255,255,255,0.07);padding:6px 8px;gap:4px;}
.tab-button{flex:1;padding:8px 4px;border:none;background:transparent;color:var(--text-light);font-size:11px;font-weight:500;border-radius:14px;cursor:pointer;transition:var(--ease);}
.tab-button.active{background:var(--tab-active);color:var(--text);font-weight:600;box-shadow:0 2px 12px rgba(0,0,0,0.2),inset 0 1px 0 rgba(255,255,255,0.2);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.15);}
.tab-content{padding:24px;}
.tab-pane{display:none;}
.tab-pane.active{display:block;}
h2{margin:0 0 20px;font-size:22px;font-weight:700;color:var(--text);letter-spacing:-0.5px;}
.input-group{margin-bottom:16px;}
.input-group label{display:block;margin-bottom:7px;font-size:13px;font-weight:500;color:var(--text-light);}
.input-group input[type=date],.input-group input[type=number],.input-group select{width:100%;padding:11px 14px;background:var(--glass-input);border:1px solid rgba(255,255,255,0.15);border-radius:14px;color:var(--text);font-size:15px;font-family:inherit;backdrop-filter:blur(10px);transition:var(--ease);-webkit-appearance:none;appearance:none;}
.input-group input[type=number]{width:90px;}
.input-group input:focus,.input-group select:focus{outline:none;border-color:var(--accent);background:rgba(255,255,255,0.15);box-shadow:0 0 0 3px rgba(77,171,247,0.2);}
.input-group select option{background:#1a2a4a;color:white;}
.checkbox-group{display:flex;align-items:center;margin-bottom:14px;cursor:pointer;gap:10px;}
.checkbox-group input[type=checkbox]{width:20px;height:20px;accent-color:var(--accent);cursor:pointer;}
.checkbox-group label{font-size:14px;color:var(--text);cursor:pointer;font-weight:400;}
.button-group{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px;}
button{padding:13px 18px;font-size:15px;font-weight:600;border:1px solid rgba(255,255,255,0.2);border-radius:16px;cursor:pointer;transition:var(--ease);color:white;font-family:inherit;letter-spacing:-0.2px;backdrop-filter:blur(10px);}
button:disabled{opacity:0.35;cursor:not-allowed;}
button:active:not(:disabled){transform:scale(0.97);}
@keyframes haptic-pulse{0%{box-shadow:0 0 0 0 rgba(77,171,247,0.55)}50%{box-shadow:0 0 0 10px rgba(77,171,247,0)}100%{box-shadow:0 0 0 0 rgba(77,171,247,0)}}
button.haptic{animation:haptic-pulse 0.35s ease-out;}
.btn-primary{background:linear-gradient(135deg,rgba(77,171,247,0.6),rgba(116,199,236,0.4));border-color:rgba(77,171,247,0.4);}
.btn-primary:hover:not(:disabled){background:linear-gradient(135deg,rgba(77,171,247,0.8),rgba(116,199,236,0.6));}
.btn-dark{background:rgba(0,0,0,0.3);border-color:rgba(255,255,255,0.12);color:white;}
.btn-dark:hover:not(:disabled){background:rgba(0,0,0,0.45);}
#btn-generate,#btn-next{background:linear-gradient(135deg,rgba(77,171,247,0.6),rgba(116,199,236,0.4));border-color:rgba(77,171,247,0.4);}
#btn-reset{background:var(--glass-btn);}
#display-area{margin-top:20px;padding:24px;background:var(--glass-display);border:1px solid rgba(255,255,255,0.1);border-radius:18px;min-height:70px;font-size:28px;font-weight:700;text-align:center;color:var(--text);display:flex;justify-content:center;align-items:center;flex-direction:column;backdrop-filter:blur(10px);letter-spacing:-0.5px;}
#speech-settings{display:none;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:16px;padding:16px;margin-top:10px;}
#speech-settings h4{color:var(--text);font-size:14px;margin-bottom:14px;}
#speech-settings .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
#speech-settings .input-group{font-size:13px;margin-bottom:4px;}
.vier-gewinnt-controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px;}
.column-btn{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.18);border-radius:10px;aspect-ratio:1;font-size:13px;font-weight:700;color:white;backdrop-filter:blur(8px);}
.column-btn:hover{background:rgba(255,255,255,0.22);}
@keyframes drop{from{transform:translateY(-180px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes pulse{0%{transform:scale(0.88)}50%{transform:scale(1.1)}100%{transform:scale(0.88)}}
#pi-status{margin:16px 0;padding:20px;background:var(--glass-display);border:1px solid rgba(255,255,255,0.1);border-radius:18px;font-size:clamp(28px,10vw,42px);font-weight:800;text-align:center;color:var(--text);min-height:2em;display:flex;align-items:center;justify-content:center;letter-spacing:-1px;backdrop-filter:blur(10px);}

<div style="width:100%;max-width:580px;margin-top:12px;padding:12px 20px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:20px;backdrop-filter:blur(10px);display:flex;align-items:center;gap:14px;">
<span style="font-size:13px;font-weight:500;color:rgba(255,255,255,0.5);white-space:nowrap;">&#x1F50A; Lautst&auml;rke</span>
<input type="range" id="vol-slider" min="0" max="1" step="0.05" value="1" style="flex:1;accent-color:#4dabf7;cursor:pointer;">
<span id="vol-label" style="font-size:13px;font-weight:600;color:rgba(255,255,255,0.6);min-width:36px;text-align:right;">100%</span>

<div style="text-align:center;padding:16px 24px 20px;width:100%;max-width:580px;">
<a href="https://conjuringlab.com/product/synaptic" target="_blank" style="display:inline-block;padding:9px 22px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:20px;color:rgba(255,255,255,0.45);font-size:12px;font-weight:500;text-decoration:none;letter-spacing:0.2px;transition:all 0.3s ease;" onmouseover="this.style.background='rgba(255,255,255,0.11)';this.style.color='rgba(255,255,255,0.7)'" onmouseout="this.style.background='rgba(255,255,255,0.06)';this.style.color='rgba(255,255,255,0.45)'">Synaptic kaufen</a>
</div>
<script>
(function(){
'use strict';
window.openTab=function(evt,id){document.querySelectorAll('.tab-pane').forEach(function(p){p.style.display='none';p.classList.remove('active');});document.querySelectorAll('.tab-button').forEach(function(b){b.classList.remove('active');});var pane=document.getElementById(id);if(pane){pane.style.display='block';pane.classList.add('active');}if(evt&&evt.currentTarget)evt.currentTarget.classList.add('active');};
var isLight=false;
document.getElementById('theme-toggle').addEventListener('click',function(){isLight=!isLight;document.body.classList.toggle('light-mode',isLight);this.textContent=isLight?'Hell':'Dunkel';});
var globalVolume=1;
var volSlider=document.getElementById('vol-slider');
var volLabel=document.getElementById('vol-label');
volSlider.addEventListener('input',function(){globalVolume=parseFloat(this.value);volLabel.textContent=Math.round(globalVolume*100)+'%';});
document.addEventListener('click',function(e){var btn=e.target.closest('button');if(btn&&!btn.disabled){btn.classList.remove('haptic');void btn.offsetWidth;btn.classList.add('haptic');btn.addEventListener('animationend',function(){btn.classList.remove('haptic');},{once:true});}});
var speechQueue=[],isSpeaking=false;
function speak(text,onDone){speechQueue.push({text:text,onDone:onDone});if(!isSpeaking)processQueue();}
function processQueue(){if(!speechQueue.length){isSpeaking=false;return;}isSpeaking=true;var item=speechQueue.shift();if(!window.speechSynthesis){if(item.onDone)item.onDone();processQueue();return;}window.speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(item.text);u.lang='de-DE';u.volume=globalVolume;u.onend=function(){if(item.onDone)item.onDone();processQueue();};u.onerror=function(){if(item.onDone)item.onDone();processQueue();};window.speechSynthesis.speak(u);}
function clearSpeech(){speechQueue=[];isSpeaking=false;if(window.speechSynthesis)window.speechSynthesis.cancel();}
function speakPause(text,ms,cb){speak(text,function(){setTimeout(cb,ms);});}
(function(){var t=new Date(),y=new Date(t.getFullYear(),t.getMonth(),t.getDate()-1);document.getElementById('end-date').value=y.getFullYear()+'-'+String(y.getMonth()+1).padStart(2,'0')+'-'+String(y.getDate()).padStart(2,'0');})();
var cpStep=0,cpDate=null;
var cpToday=new Date();
var cpTodayOnly=new Date(cpToday.getFullYear(),cpToday.getMonth(),cpToday.getDate());
document.getElementById('enable-speech').addEventListener('change',function(){document.getElementById('speech-settings').style.display=this.checked?'block':'none';});
document.getElementById('btn-generate').addEventListener('click',function(){var sVal=document.getElementById('start-date').value;var eVal=document.getElementById('end-date').value;if(!sVal||!eVal){alert('Bitte Start- und Enddatum eingeben.');return;}var s=new Date(sVal),e=new Date(eVal);if(isNaN(s)||isNaN(e)||s>=e){alert('Startdatum muss vor Enddatum liegen.');return;}cpDate=new Date(s.getTime()+Math.random()*(e.getTime()-s.getTime()));cpStep=0;document.getElementById('setup-view').style.display='none';document.getElementById('result-view').style.display='block';document.getElementById('btn-next').disabled=false;document.getElementById('btn-next').textContent='N\u00e4chster Schritt';if(document.getElementById('enable-speech').checked){cpRunSpeech();}else{document.getElementById('display-area').innerHTML='Bereit!<br><small style="font-size:14px;font-weight:normal;color:var(--text-light);">Klicke auf N\u00e4chster Schritt</small>';}});
document.getElementById('btn-next').addEventListener('click',cpNextStep);
document.getElementById('btn-reset').addEventListener('click',cpReset);
function cpGetSteps(){var fmt=document.getElementById('date-format').value;var z=document.getElementById('show-zodiac').checked;var base=fmt==='YMD'?['year','month','day','weekday','days']:['day','month','year','weekday','days'];if(z)base.push('zodiac');return base;}
function cpNextStep(){if(!cpDate)return;cpStep++;var steps=cpGetSteps();if(cpStep>steps.length){cpEndSeq();return;}var name=steps[cpStep-1];var content='',sub='';switch(name){case 'year':content=cpDate.getFullYear();break;case 'month':content=cpDate.toLocaleString('de-DE',{month:'long'});break;case 'day':content=cpDate.getDate();break;case 'weekday':content=cpDate.toLocaleString('de-DE',{weekday:'long'});break;case 'days':var diff=Math.floor((cpTodayOnly-new Date(cpDate.getFullYear(),cpDate.getMonth(),cpDate.getDate()))/(864e5));content=diff;sub='Tage vergangen';break;case 'zodiac':content=cpZodiac(cpDate);break;default:cpEndSeq();return;}document.getElementById('display-area').innerHTML=content+(sub?'<br><small style="font-size:14px;font-weight:normal;color:var(--text-light);">'+sub+'</small>':'');if(cpStep>=steps.length){document.getElementById('btn-next').textContent='Fertig';document.getElementById('btn-next').disabled=true;}}
function cpEndSeq(){document.getElementById('display-area').innerHTML='Sequenz beendet.<br><small style="font-size:14px;font-weight:normal;color:var(--text-light);">Zur\u00fccksetzen klicken.</small>';document.getElementById('btn-next').disabled=true;document.getElementById('btn-next').textContent='N\u00e4chster Schritt';}
function cpReset(){clearSpeech();cpStep=0;cpDate=null;document.getElementById('setup-view').style.display='block';document.getElementById('result-view').style.display='none';document.getElementById('btn-next').disabled=false;document.getElementById('btn-next').textContent='N\u00e4chster Schritt';}
function cpRunSpeech(){document.getElementById('btn-next').disabled=true;document.getElementById('display-area').textContent='Sprachausgabe startet...';clearSpeech();var d={initial:parseInt(document.getElementById('delay-initial').value)*1000,ym:parseInt(document.getElementById('delay-year-month').value)*1000,md:parseInt(document.getElementById('delay-month-day').value)*1000,dw:parseInt(document.getElementById('delay-day-weekday').value)*1000,wd:parseInt(document.getElementById('delay-weekday-days').value)*1000,digit:parseInt(document.getElementById('delay-digit').value)*1000};var fmt=document.getElementById('date-format').value;var year=cpDate.getFullYear().toString();var month=cpDate.toLocaleString('de-DE',{month:'long'});var day=cpDate.getDate().toString();var weekday=cpDate.toLocaleString('de-DE',{weekday:'long'});var diff=Math.floor((cpTodayOnly-new Date(cpDate.getFullYear(),cpDate.getMonth(),cpDate.getDate()))/(864e5));var diffDigits=diff.toString().split('');var showZ=document.getElementById('show-zodiac').checked;var dateSteps=fmt==='YMD'?[[year,d.initial],[month,d.ym],[day,d.md]]:[[day,d.initial],[month,d.ym],[year,d.md]];var area=document.getElementById('display-area');function runSteps(arr,i,done){if(i>=arr.length){done();return;}area.textContent=arr[i][0];speakPause(arr[i][0],arr[i][1],function(){runSteps(arr,i+1,done);});}setTimeout(function(){runSteps(dateSteps,0,function(){area.textContent=weekday;speakPause(weekday,d.dw,function(){area.innerHTML=diff+'<br><small style="font-size:14px;color:var(--text-light);">Tage vergangen</small>';function spDigit(i){if(i>=diffDigits.length){if(showZ){setTimeout(function(){var z=cpZodiac(cpDate);area.textContent=z;speakPause(z,1000,cpEndSeq);},d.wd);}else{setTimeout(cpEndSeq,d.wd);}return;}speakPause(diffDigits[i],d.digit,function(){spDigit(i+1);});}spDigit(0);});});},d.initial);}
function cpZodiac(date){var d=date.getDate(),m=date.getMonth()+1;if((m==1&&d>=21)||(m==2&&d<=19))return'Wassermann';if((m==2&&d>=20)||(m==3&&d<=20))return'Fische';if((m==3&&d>=21)||(m==4&&d<=20))return'Widder';if((m==4&&d>=21)||(m==5&&d<=20))return'Stier';if((m==5&&d>=21)||(m==6&&d<=21))return'Zwillinge';if((m==6&&d>=22)||(m==7&&d<=22))return'Krebs';if((m==7&&d>=23)||(m==8&&d<=23))return'L\u00f6we';if((m==8&&d>=24)||(m==9&&d<=23))return'Jungfrau';if((m==9&&d>=24)||(m==10&&d<=23))return'Waage';if((m==10&&d>=24)||(m==11&&d<=22))return'Skorpion';if((m==11&&d>=23)||(m==12&&d<=21))return'Sch\u00fctze';return'Steinbock';}
var ROWS=6,COLS=7,P1='user',P2='app';
var vgGames=[];
var APP_COLORS=[{name:'App 1',label:'#ff6b6b'},{name:'App 2',label:'#a9e34b'},{name:'App 3',label:'#f783ac'},{name:'App 4',label:'#ffd43b'}];
var vgTurnQueue=[];  // globale Zugreihenfolge: [{gameIdx, player},...]
var vgTurnIndex=0;  // aktueller Schritt in der Queue
document.getElementById('vg-reset').addEventListener('click',vgInit);
document.getElementById('vg-show-board').addEventListener('change',function(){vgGames.forEach(function(g){g.boardEl.style.display=document.getElementById('vg-show-board').checked?'grid':'none';});});
function vgInit(){var n=parseInt(document.getElementById('vg-num-players').value);var container=document.getElementById('vg-container');container.innerHTML='';vgGames=[];vgTurnQueue=[];vgTurnIndex=0;document.getElementById('vg-last-move-box').style.display='none';
var starter=document.getElementById('vg-starter').value;
// Baue Zugreihenfolge: abwechselnd App[i] -> Nutzer für jedes Spielfeld, dann nächste App
for(var i=0;i<n;i++){var ac=APP_COLORS[i];var wrap=document.createElement('div');wrap.style.cssText='margin-bottom:24px;padding:16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:20px;';var title=document.createElement('div');title.style.cssText='font-size:14px;font-weight:700;color:'+ac.label+';margin-bottom:10px;';title.textContent='Spielfeld gegen '+ac.name;wrap.appendChild(title);
var counterEl=document.createElement('div');counterEl.style.cssText='font-size:12px;color:rgba(255,255,255,0.45);margin-bottom:6px;text-align:center;';counterEl.textContent='0 Züge';wrap.appendChild(counterEl);
var statusEl=document.createElement('div');statusEl.style.cssText='margin-bottom:8px;padding:10px 14px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.08);border-radius:12px;font-size:14px;font-weight:600;color:rgba(255,255,255,0.85);text-align:center;';statusEl.textContent='Startet...';wrap.appendChild(statusEl);var colBtns=document.createElement('div');colBtns.style.cssText='display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:6px;';wrap.appendChild(colBtns);var boardEl=document.createElement('div');var showB=document.getElementById('vg-show-board').checked;boardEl.style.cssText='display:'+(showB?'grid':'none')+';grid-template-columns:repeat(7,1fr);gap:4px;background:rgba(0,30,100,0.3);border:1px solid rgba(77,171,247,0.15);padding:8px;border-radius:14px;';wrap.appendChild(boardEl);container.appendChild(wrap);var game={board:Array(ROWS).fill(null).map(function(){return Array(COLS).fill(null);}),over:false,moves:0,userMoves:0,appMoves:0,current:starter,boardEl:boardEl,colBtns:colBtns,statusEl:statusEl,counterEl:counterEl,ac:ac,idx:i};vgGames.push(game);vgRenderBoard(game);vgRenderColBtns(game);}
// Erstelle globale Zugreihenfolge
vgBuildTurnQueue();
vgExecuteTurn();}
function vgRenderBoard(game){game.boardEl.innerHTML='';for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++){var cell=document.createElement('div');cell.style.cssText='aspect-ratio:1;background:rgba(0,0,0,0.35);border-radius:50%;display:flex;justify-content:center;align-items:center;border:1px solid rgba(255,255,255,0.07);';cell.dataset.r=r;cell.dataset.c=c;if(game.board[r][c]){var p=document.createElement('div');var isU=game.board[r][c]===P1;p.style.cssText='width:85%;height:85%;border-radius:50%;background:'+(isU?'radial-gradient(circle at 35% 35%,#ffe066,#f59f00)':'radial-gradient(circle at 35% 35%,'+game.ac.label+'cc,'+game.ac.label+'88)')+';box-shadow:0 2px 8px rgba(0,0,0,0.4);animation:drop 0.3s ease;';cell.appendChild(p);}game.boardEl.appendChild(cell);}}
function vgRenderColBtns(game){game.colBtns.innerHTML='';for(var c=0;c<COLS;c++){var btn=document.createElement('button');btn.style.cssText='background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);border-radius:8px;aspect-ratio:1;font-size:12px;font-weight:700;color:white;cursor:pointer;padding:2px;';btn.textContent='\u2193'+(c+1);btn.dataset.col=c;btn.addEventListener('click',(function(g){return function(e){vgColClick(e,g);};})(game));game.colBtns.appendChild(btn);}}
function vgBuildTurnQueue(){
var n=vgGames.length;
var starter=document.getElementById('vg-starter').value;
// Pro Runde: alle n App-Züge verschachtelt mit Nutzer-Zügen
// Reihenfolge: wenn starter=app: App0,Nutzer@0, App1,Nutzer@1, ..., dann wieder
// wenn starter=user: Nutzer@0,App0, Nutzer@1,App1, ...
vgTurnQueue=[];
// Wir bauen eine Endlos-Queue (bis alle Spiele vorbei)
// Strategie: Runde für Runde, jede Runde = n*(App+Nutzer)-Paare
var maxRounds=ROWS*COLS; // max mögliche Züge
for(var round=0;round<maxRounds;round++){
for(var i=0;i<n;i++){
if(starter==='app'){
vgTurnQueue.push({gameIdx:i,player:P2});
vgTurnQueue.push({gameIdx:i,player:P1});
} else {
vgTurnQueue.push({gameIdx:i,player:P1});
vgTurnQueue.push({gameIdx:i,player:P2});
}
}
}
}
function vgExecuteTurn(){
// Überspringe abgeschlossene Spiele
while(vgTurnIndex<vgTurnQueue.length){
var t=vgTurnQueue[vgTurnIndex];
var g=vgGames[t.gameIdx];
if(g.over){vgTurnIndex++;continue;}
if(vgFull(g)){vgEnd(g,null);vgTurnIndex++;continue;}
break;
}
if(vgTurnIndex>=vgTurnQueue.length)return;
var turn=vgTurnQueue[vgTurnIndex];
var game=vgGames[turn.gameIdx];
// Alle Spiele sperren
vgGames.forEach(function(g){if(!g.over)vgDisable(g,true);});
vgUpdateAllCounters();
if(turn.player===P2){
game.statusEl.textContent=game.ac.name+' denkt...';
game.statusEl.style.color='rgba(255,255,255,0.85)';
setTimeout(function(){vgAppMove(game);},900);
} else {
// Nutzer ist dran bei game
game.statusEl.textContent='⬇ Dein Zug hier!';
game.statusEl.style.color='#4dabf7';
// Nur dieses Spielfeld freischalten
vgDisable(game,false);
// Andere Spiele bleiben gesperrt — Klick dort = Warnung
vgGames.forEach(function(g,gi){
if(!g.over&&gi!==turn.gameIdx){
g.statusEl.textContent='⏳ Warte – erst bei '+vgGames[turn.gameIdx].ac.name+' spielen';
g.statusEl.style.color='rgba(255,200,80,0.8)';
vgSetWrongClickWarning(g,turn.gameIdx);
}
});
}
}
function vgSetWrongClickWarning(game,correctIdx){
game.colBtns.querySelectorAll('button').forEach(function(b){
b.disabled=false; // kurz freischalten für Klick-Event
b.onclick=function(){
var box=document.getElementById('vg-last-move-box');
var txt=document.getElementById('vg-last-move-text');
txt.innerHTML='⚠️ Falsches Spielfeld! Bitte zuerst bei <strong>'+vgGames[correctIdx].ac.name+'</strong> spielen.';
box.style.display='block';
setTimeout(function(){box.style.display='none';},3000);
};
b.disabled=true; // wieder sperren, aber onclick bleibt
});
// Eigentlich wollen wir, dass der Button klickbar ist aber disabled-Stil verhindert das.
// Lösung: Button nicht disabled, aber eigene Klick-Logik
game.colBtns.querySelectorAll('button').forEach(function(b){
b.disabled=false;
b.style.opacity='0.35';
b.style.cursor='not-allowed';
});
}
function vgUpdateAllCounters(){
var n=vgGames.length;
// Finde maximale Nutzer-Züge über alle Spiele
var maxUserMoves=0;
vgGames.forEach(function(g){if(g.userMoves>maxUserMoves)maxUserMoves=g.userMoves;});
vgGames.forEach(function(g){
if(g.over)return;
var lag=maxUserMoves-g.userMoves;
var txt=g.moves+' Züge gesamt (Du: '+g.userMoves+', '+g.ac.name+': '+g.appMoves+')';
if(lag>0)txt+=' · '+lag+' Zug'+(lag>1?'e':'')+' im Rückstand';
g.counterEl.textContent=txt;
});
}
function vgUpdateStatus(game){if(game.over)return;}
function vgColClick(e,game){
// Prüfe ob dieses Spiel gerade dran ist
if(vgTurnIndex<vgTurnQueue.length){
var t=vgTurnQueue[vgTurnIndex];
if(t.gameIdx!==game.idx||t.player!==P1){
// Falsches Spielfeld
var box=document.getElementById('vg-last-move-box');
var txt=document.getElementById('vg-last-move-text');
txt.innerHTML='⚠️ Falsches Spielfeld! Bitte zuerst bei <strong>'+vgGames[t.gameIdx].ac.name+'</strong> spielen.';
box.style.display='block';
setTimeout(function(){box.style.display='none';},3000);
return;
}
}
if(game.over)return;
var col=parseInt(e.target.dataset.col);
var row=vgFindRow(game,col);
if(row!==-1){document.getElementById('vg-last-move-box').style.display='none';vgDrop(game,row,col,P1);}}
function vgDrop(game,row,col,player){game.board[row][col]=player;game.moves++;if(player===P1)game.userMoves++;else game.appMoves++;vgRenderBoard(game);if(vgCheckWin(game,player)){vgEnd(game,player);vgTurnIndex++;vgExecuteTurn();return;}if(vgFull(game)){vgEnd(game,null);vgTurnIndex++;vgExecuteTurn();return;}vgTurnIndex++;vgExecuteTurn();}
function vgFindRow(game,col){for(var r=ROWS-1;r>=0;r--)if(game.board[r][col]===null)return r;return -1;}
function vgAppMove(game){if(game.over)return;var avail=[];for(var c=0;c<COLS;c++)if(game.board[0][c]===null)avail.push(c);if(avail.length){var col=avail[Math.floor(Math.random()*avail.length)];var row=vgFindRow(game,col);var moveMsg=game.ac.name+' setzt in Spalte '+(col+1)+'.';if(document.getElementById('vg-speech').checked)speak(moveMsg);var boardHidden=!document.getElementById('vg-show-board').checked;vgDrop(game,row,col,P2);if(boardHidden&&!game.over){vgShowLastMove(game,moveMsg);}}}
function vgCheckWin(game,player){var b=game.board;function ok(a,b2,c,d){return a!==null&&a===b2&&a===c&&a===d&&a===player;}for(var r=0;r<ROWS;r++)for(var c=0;c<=COLS-4;c++)if(ok(b[r][c],b[r][c+1],b[r][c+2],b[r][c+3])){vgHighlight(game,[[r,c],[r,c+1],[r,c+2],[r,c+3]]);game.winDir='Horizontal';return true;}for(var c=0;c<COLS;c++)for(var r=0;r<=ROWS-4;r++)if(ok(b[r][c],b[r+1][c],b[r+2][c],b[r+3][c])){vgHighlight(game,[[r,c],[r+1,c],[r+2,c],[r+3,c]]);game.winDir='Vertikal';return true;}for(var r=0;r<=ROWS-4;r++)for(var c=0;c<=COLS-4;c++)if(ok(b[r][c],b[r+1][c+1],b[r+2][c+2],b[r+3][c+3])){vgHighlight(game,[[r,c],[r+1,c+1],[r+2,c+2],[r+3,c+3]]);game.winDir='Diagonal';return true;}for(var r=3;r<ROWS;r++)for(var c=0;c<=COLS-4;c++)if(ok(b[r][c],b[r-1][c+1],b[r-2][c+2],b[r-3][c+3])){vgHighlight(game,[[r,c],[r-1,c+1],[r-2,c+2],[r-3,c+3]]);game.winDir='Diagonal';return true;}return false;}
function vgHighlight(game,cells){cells.forEach(function(rc){var el=game.boardEl.querySelector('[data-r="'+rc[0]+'"][data-c="'+rc[1]+'"]');if(el)el.style.boxShadow='0 0 0 3px rgba(255,255,255,0.8)';});}
function vgFull(game){return game.board[0].every(function(c){return c!==null;});}
function vgEnd(game,winner){game.over=true;vgDisable(game,true);var msg='';if(winner===P1)msg='Du hast gewonnen! '+(game.winDir||'')+' ('+game.moves+' Z\u00fcge)';else if(winner===P2)msg=game.ac.name+' hat gewonnen! '+(game.winDir||'')+' ('+game.moves+' Z\u00fcge)';else msg='Unentschieden! ('+game.moves+' Z\u00fcge)';game.statusEl.textContent=msg;game.statusEl.style.color=winner===P1?'#51cf66':winner===P2?game.ac.label:'rgba(255,255,255,0.7)';if(document.getElementById('vg-speech').checked)speak(msg);}
function vgDisable(game,dis){game.colBtns.querySelectorAll('button').forEach(function(b){b.disabled=dis;});}
function vgShowLastMove(game,msg){var box=document.getElementById('vg-last-move-box');var txt=document.getElementById('vg-last-move-text');txt.innerHTML=msg+'<br><small style="font-size:12px;color:var(--text-light);">Klicke auf eine Spalte, um deinen Zug zu machen.</small>';box.style.display='block';}
vgInit();
var PI='14159265358979323846264338327950288419716939937510582097494459230781640628620899862803482534211706798214808651328230664709384460955058223172535940812848111745028410270193852110555964462294895493038196442881097566593344612847564823378678316527120190914564856692346034861045432664821339360726024914127372458700660631558817488152092096282925409171536436789259036001133053054882046652138414695194151160943305727036575959195309218611738193261179310511854807446237996274956735188575272489122793818301194912983367336244065664308602139494639522473719070217986094370277053921717629317675238467481846766940513200056812714526356082778577134275778960917363717872146844090122495343014654958537105079227968925892354201995611212902196086403441815981362977477130996051870721134999999837297804995105973173281609631859502445945534690830264252230825334468503526193118817101000313783875288658753320838142061717766914730359825349042875546873115956286388235378759375195778185778053217122680661300192787661119590921642019893809525720106548586327886593615338182796823030195203530185296899577362259941389124972177528347913151557485724245415069595082953311686172785588907509838175463746493931925506040092770167113900984882401285836160356370766010471018194295559619894676783744944825537977472684710404753464620804668425906949129331367702898915210475216205696602405803815019351125338243003558764024749647326391419927260426992279678235478163600934172164121992458631503028618297455570674983850549458858692699569092721079750930295532116534498720275596023648066549911988183479775356636980742654252786255181841757467289097777279380008164706001614524919217321721477235014144197356854816136115735255213347574184946843852332390739414333454776241686251898356948556209921922218427255025425688767179049460165346680498862723279178608578438382796797668145410095388378636095068006422512520511739298489608412848862694560424196528502221066118630674427862203919494504712371378696095176237';
var SEQ=20,piRunning=false,piTimeout=null,piStart=0,piCur=0,piDir='forward';
document.getElementById('pi-start').addEventListener('click',function(){if(piRunning)return;var max=PI.length-SEQ-10;piStart=Math.floor(Math.random()*max);var dv=document.getElementById('pi-direction').value;piDir=dv==='random'?(Math.random()<0.5?'forward':'backward'):dv;piCur=piDir==='forward'?piStart:piStart+SEQ-1;piRunning=true;document.getElementById('pi-start').style.display='none';document.getElementById('pi-stop').style.display='block';document.getElementById('pi-status').textContent='...';if(document.getElementById('pi-show-ctx').checked)piUpdateCtx();piStep();});
document.getElementById('pi-stop').addEventListener('click',piStop);
document.getElementById('pi-show-ctx').addEventListener('change',function(){document.getElementById('pi-context-box').style.display=this.checked?'block':'none';if(this.checked)piUpdateCtx();});
function piStep(){if(!piRunning)return;if(piCur<0||piCur>=PI.length){piStop();return;}var digit=PI[piCur];document.getElementById('pi-status').textContent=digit;if(document.getElementById('pi-show-ctx').checked)piUpdateCtx();speak(digit,function(){if(!piRunning)return;var ms=parseFloat(document.getElementById('pi-delay').value)*1000;piTimeout=setTimeout(function(){piCur+=piDir==='forward'?1:-1;piStep();},ms);});}
function piStop(){piRunning=false;clearTimeout(piTimeout);clearSpeech();document.getElementById('pi-start').style.display='block';document.getElementById('pi-stop').style.display='none';document.getElementById('pi-status').textContent='Gestoppt.';}
function piUpdateCtx(){var from=Math.max(0,piStart-10);var to=Math.min(PI.length,piStart+SEQ+10);var chunk=PI.slice(from,to);var html='<div style="font-size:11px;color:var(--text-light);margin-bottom:6px;">Position '+(piStart+1)+'\u2013'+(piStart+SEQ)+'</div>';for(var i=0;i<chunk.length;i++){var abs=from+i;var inSeq=abs>=piStart&&abs<piStart+SEQ;var isCur=abs===piCur;if(isCur)html+='<span style="background:var(--accent);color:#000;border-radius:4px;padding:0 2px;">'+chunk[i]+'</span>';else if(inSeq)html+='<span style="color:var(--accent);">'+chunk[i]+'</span>';else html+='<span style="color:var(--text-light);">'+chunk[i]+'</span>';}document.getElementById('pi-context-box').innerHTML=html;}
var CC_TYPES=[{name:'Visa',prefix:'4',len:16},{name:'Mastercard',prefix:'51',len:16},{name:'Amex',prefix:'34',len:15},{name:'Discover',prefix:'6011',len:16}];
var ccState='idle',ccFull='',ccMissIdx=-1,ccMissDig='',ccTimeout=null;
document.getElementById('cc-show-num').addEventListener('change',function(){document.getElementById('cc-number-box').style.display=this.checked?'block':'none';});
document.getElementById('cc-main').addEventListener('click',function(){if(ccState==='idle')ccGenerate();else if(ccState==='ready')ccRead();else if(ccState==='done')ccShowSolution();});
document.getElementById('cc-reset').addEventListener('click',ccReset);
function ccLuhn(num){var sum=0,alt=false;for(var i=num.length-1;i>=0;i--){var n=parseInt(num[i]);if(alt){n*=2;if(n>9)n-=9;}sum+=n;alt=!alt;}return sum%10===0;}
function ccMakeLuhn(prefix,length){var num=prefix;while(num.length<length-1)num+=Math.floor(Math.random()*10);for(var ch=0;ch<=9;ch++)if(ccLuhn(num+ch))return num+ch;return num+'0';}
function ccGenerate(){var t=CC_TYPES[Math.floor(Math.random()*CC_TYPES.length)];ccFull=ccMakeLuhn(t.prefix,t.len);ccMissIdx=1+Math.floor(Math.random()*(ccFull.length-2));ccMissDig=ccFull[ccMissIdx];var html='';for(var i=0;i<ccFull.length;i++){if(i>0&&i%4===0)html+=' ';html+=i===ccMissIdx?'<span style="color:var(--red);font-weight:900;">?</span>':ccFull[i];}document.getElementById('cc-number-box').innerHTML=html;document.getElementById('cc-number-box').style.display=document.getElementById('cc-show-num').checked?'block':'none';document.getElementById('cc-answer-box').style.display='none';document.getElementById('cc-status').textContent=t.name+' \u00b7 '+t.len+' Ziffern \u00b7 Bereit';ccState='ready';document.getElementById('cc-main').textContent='Vorlesen';}
function ccRead(){ccState='reading';document.getElementById('cc-main').disabled=true;document.getElementById('cc-main').textContent='Liest vor...';clearSpeech();var delay=parseFloat(document.getElementById('cc-delay').value)*1000;var digits=ccFull.split('');var i=0;function next(){if(i>=digits.length){ccState='done';document.getElementById('cc-main').disabled=false;document.getElementById('cc-main').textContent='L\u00f6sung anzeigen';document.getElementById('cc-status').textContent='Vorlesen beendet.';return;}if(i===ccMissIdx){document.getElementById('cc-status').textContent='?';ccBeep();ccTimeout=setTimeout(function(){i++;next();},delay);}else{document.getElementById('cc-status').textContent=digits[i];speakPause(digits[i],delay,function(){i++;next();});}}next();}
function ccBeep(){try{var ctx=new(window.AudioContext||window.webkitAudioContext)();var osc=ctx.createOscillator(),gain=ctx.createGain();osc.connect(gain);gain.connect(ctx.destination);osc.type='sine';osc.frequency.value=880;gain.gain.setValueAtTime(globalVolume*0.4,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4);osc.start();osc.stop(ctx.currentTime+0.4);}catch(e){}}
function ccShowSolution(){document.getElementById('cc-answer').textContent=ccMissDig;document.getElementById('cc-answer-box').style.display='block';document.getElementById('cc-status').textContent='L\u00f6sung angezeigt.';document.getElementById('cc-main').disabled=true;document.getElementById('cc-main').textContent='Fertig';speak(ccMissDig);}
function ccReset(){clearTimeout(ccTimeout);clearSpeech();ccState='idle';ccFull='';ccMissIdx=-1;ccMissDig='';document.getElementById('cc-main').disabled=false;document.getElementById('cc-main').textContent='Karte generieren';document.getElementById('cc-status').textContent='Bereit.';document.getElementById('cc-answer-box').style.display='none';document.getElementById('cc-number-box').style.display='none';document.getElementById('cc-number-box').innerHTML='';document.getElementById('cc-show-num').checked=false;}
})();
