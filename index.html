<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synaptic Tester</title>
    <style>
        :root {
            --ease: all 0.2s ease-in-out;
        }

        body[data-theme='light'] {
            --page-bg: #f4f4f9;
            --text-color: #333;
            --text-color-light: #555;
            --app-bg: white;
            --app-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            --tabs-bg: #e9ecef;
            --tab-text: #495057;
            --tab-active-text: #007bff;
            --tab-active-bg: white;
            --tab-active-border: #007bff;
            --input-bg: white;
            --input-border: #ced4da;
            --display-bg: #e9ecef;
            --display-text: #333;
            --btn-primary-bg: #007bff;
            --btn-primary-hover: #0056b3;
            --btn-secondary-bg: #6c757d;
            --btn-secondary-hover: #5a6268;
            --btn-disabled-bg: #adb5bd;
            --speech-settings-bg: #f9f9f9;
            --speech-settings-border: #ddd;
            --theme-toggle-bg: #e9ecef;
            --theme-toggle-hover: #d1d9e0;
            --theme-toggle-icon: '☀️';
        }

        body[data-theme='dark'] {
            --page-bg: #1a1a1a;
            --text-color: #e0e0e0;
            --text-color-light: #aaa;
            --app-bg: #2c2c2c;
            --app-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
            --tabs-bg: #222;
            --tab-text: #bbb;
            --tab-active-text: #4dabf7;
            --tab-active-bg: #2c2c2c;
            --tab-active-border: #4dabf7;
            --input-bg: #333;
            --input-border: #555;
            --display-bg: #222;
            --display-text: #e0e0e0;
            --btn-primary-bg: #007bff;
            --btn-primary-hover: #0056b3;
            --btn-secondary-bg: #5a6268;
            --btn-secondary-hover: #495057;
            --btn-disabled-bg: #444;
            --speech-settings-bg: #333;
            --speech-settings-border: #444;
            --theme-toggle-bg: #333;
            --theme-toggle-hover: #444;
            --theme-toggle-icon: '🌙';
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--page-bg);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding-top: 40px;
            transition: var(--ease);
        }

        .app-container {
            background-color: var(--app-bg);
            border-radius: 12px;
            box-shadow: var(--app-shadow);
            width: 90%;
            max-width: 500px;
            overflow: hidden;
            transition: var(--ease);
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: var(--tabs-bg);
            font-weight: bold;
            font-size: 18px;
            transition: var(--ease);
        }

        #theme-toggle {
            background-color: var(--theme-toggle-bg);
            border: 1px solid var(--input-border);
            border-radius: 20px;
            cursor: pointer;
            padding: 5px 10px;
            font-size: 18px;
            transition: var(--ease);
            width: 44px;
            text-align: center;
            color: var(--text-color);
        }
        #theme-toggle:hover {
            background-color: var(--theme-toggle-hover);
        }

        .tabs {
            display: flex;
            background-color: var(--tabs-bg);
            transition: var(--ease);
        }
        .tab-button {
            padding: 15px 20px;
            border: none;
            background-color: transparent;
            cursor: pointer;
            font-size: 16px;
            color: var(--tab-text);
            flex-grow: 1;
            font-weight: 500;
            border-bottom: 3px solid transparent;
            transition: var(--ease);
        }
        .tab-button.active {
            background-color: var(--tab-active-bg);
            color: var(--tab-active-text);
            border-bottom-color: var(--tab-active-border);
            font-weight: 600;
        }
        .tab-content {
            padding: 25px;
        }
        .tab-pane {
            display: none;
        }
        .tab-pane.active {
            display: block;
        }
        h2 {
            margin-top: 0;
            color: var(--tab-active-text);
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-color-light);
        }
        .input-group input[type="date"],
        .input-group input[type="number"] {
            width: calc(100% - 22px);
            padding: 10px;
            border: 1px solid var(--input-border);
            border-radius: 6px;
            font-size: 16px;
            background-color: var(--input-bg);
            color: var(--text-color);
            transition: var(--ease);
        }
        .input-group input[type="number"] {
            width: 80%;
            padding: 5px;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            cursor: pointer;
        }
        .checkbox-group input {
            margin-right: 10px;
            width: 16px;
            height: 16px;
            accent-color: var(--tab-active-text);
        }
        .checkbox-group label {
            cursor: pointer;
        }
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }
        button {
            padding: 12px 15px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            color: white;
        }
        button:disabled {
            background-color: var(--btn-disabled-bg);
            cursor: not-allowed;
            color: #999;
        }
        button:active:not(:disabled) {
            transform: scale(0.98);
        }
        #btn-generate, #btn-next {
            background-color: var(--btn-primary-bg);
        }
        #btn-reset {
            background-color: var(--btn-secondary-bg);
        }
        #btn-generate:hover, #btn-next:hover:not(:disabled) {
            background-color: var(--btn-primary-hover);
        }
        #btn-reset:hover {
            background-color: var(--btn-secondary-hover);
        }
        #display-area {
            margin-top: 25px;
            padding: 20px;
            background-color: var(--display-bg);
            border-radius: 6px;
            min-height: 60px;
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            color: var(--display-text);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: var(--ease);
        }
        #speech-settings {
            display: none;
            border: 1px solid var(--speech-settings-border);
            padding: 15px;
            border-radius: 6px;
            margin-top: 10px;
            background-color: var(--speech-settings-bg);
            transition: var(--ease);
        }
        #speech-settings h4 {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 16px;
            color: var(--tab-active-text);
        }
        #speech-settings .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        #speech-settings .input-group {
            font-size: 14px;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="app-header">
        <span>Synaptic Tester v1.0</span>
        <button id="theme-toggle" title="Theme umschalten">🌙</button>
    </div>

    <div class="tabs">
        <button class="tab-button active" onclick="openTab(event, 'date-function')">Calendar Prodigy</button>
        <button class="tab-button" onclick="openTab(event, 'placeholder1')">Weitere Funktion...</button>
    </div>

    <!-- TAB: Calendar Prodigy -->
    <div id="date-function" class="tab-content tab-pane active">
        <h2>Zufälliges Datum</h2>
        <div id="setup-view">
            <div class="input-group">
                <label for="start-date">Anfangsdatum</label>
                <input type="date" id="start-date" value="1950-01-01">
            </div>
            <div class="input-group">
                <label for="end-date">Enddatum</label>
                <input type="date" id="end-date">
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="show-zodiac">
                <label for="show-zodiac">Optional: Sternzeichen anzeigen</label>
            </div>
            <div class="checkbox-group" style="margin-top: 10px;">
                <input type="checkbox" id="enable-speech">
                <label for="enable-speech">Sprachausgabe aktivieren</label>
            </div>
            <div id="speech-settings">
                <h4>Pausen für Sprachausgabe (Sekunden)</h4>
                <div class="grid">
                    <div class="input-group">
                        <label for="delay-initial">Start</label>
                        <input type="number" id="delay-initial" value="5" min="0">
                    </div>
                    <div class="input-group">
                        <label for="delay-year-month">nach Jahr</label>
                        <input type="number" id="delay-year-month" value="10" min="0">
                    </div>
                    <div class="input-group">
                        <label for="delay-month-day">nach Monat</label>
                        <input type="number" id="delay-month-day" value="10" min="0">
                    </div>
                    <div class="input-group">
                        <label for="delay-day-weekday">nach Tag</label>
                        <input type="number" id="delay-day-weekday" value="10" min="0">
                    </div>
                    <div class="input-group">
                        <label for="delay-weekday-days">nach Wochentag</label>
                        <input type="number" id="delay-weekday-days" value="10" min="0">
                    </div>
                    <div class="input-group">
                        <label for="delay-digit">zw. Ziffern</label>
                        <input type="number" id="delay-digit" value="3" min="0">
                    </div>
                </div>
            </div>
            <button id="btn-generate" style="width: 100%; margin-top: 20px;">Zufälliges Datum generieren</button>
        </div>

        <div id="result-view" style="display: none;">
            <div id="display-area">Warte auf Eingabe...</div>
            <div class="button-group">
                <button id="btn-next">Nächster Schritt</button>
                <button id="btn-reset">Zurücksetzen</button>
            </div>
        </div>
    </div>

    <!-- TAB: Placeholder -->
    <div id="placeholder1" class="tab-content tab-pane">
        <h2>Weitere Funktion</h2>
        <p style="color: var(--text-color-light);">Dieser Bereich ist für zukünftige Funktionen reserviert.</p>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {

    // ── THEME ──────────────────────────────────────────────
    const themeToggleBtn = document.getElementById('theme-toggle');
    const body = document.body;

    function applyTheme(theme) {
        body.setAttribute('data-theme', theme);
        themeToggleBtn.textContent = theme === 'dark' ? '🌙' : '☀️';
        try { localStorage.setItem('synaptic-theme', theme); } catch(e) {}
    }

    themeToggleBtn.addEventListener('click', () => {
        applyTheme(body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });

    let savedTheme;
    try { savedTheme = localStorage.getItem('synaptic-theme'); } catch(e) {}
    applyTheme(savedTheme || 'dark');


    // ── STATE ──────────────────────────────────────────────
    const today = new Date();
    document.getElementById('end-date').value = today.toISOString().split('T')[0];

    let currentStep    = 0;
    let randomDate     = null;
    let speechTimeouts = [];
    const todayOnly = new Date(today.getFullYear(), today.getMonth(), today.getDate());

    // ── DOM REFS ───────────────────────────────────────────
    const btnGenerate      = document.getElementById('btn-generate');
    const btnNext          = document.getElementById('btn-next');
    const btnReset         = document.getElementById('btn-reset');
    const displayArea      = document.getElementById('display-area');
    const setupView        = document.getElementById('setup-view');
    const resultView       = document.getElementById('result-view');
    const enableSpeechChk  = document.getElementById('enable-speech');
    const speechSettings   = document.getElementById('speech-settings');

    // ── EVENT LISTENERS ────────────────────────────────────
    btnGenerate.addEventListener('click', generateRandomDate);
    btnNext.addEventListener('click', showNextStep);
    btnReset.addEventListener('click', resetApp);
    enableSpeechChk.addEventListener('change', () => {
        speechSettings.style.display = enableSpeechChk.checked ? 'block' : 'none';
        if (!enableSpeechChk.checked) clearAllTimeouts();
    });

    // ── HELPERS ────────────────────────────────────────────
    function speak(text) {
        if (!('speechSynthesis' in window) || !enableSpeechChk.checked) return;
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'de-DE';
        window.speechSynthesis.speak(u);
    }

    function getDelay(id) {
        return parseInt(document.getElementById(id).value || 0) * 1000;
    }

    function daysBetween(date) {
        const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        return Math.floor((todayOnly - d) / 86400000);
    }

    function getZodiacSign(date) {
        const d = date.getDate(), m = date.getMonth() + 1;
        if ((m==1&&d>=21)||(m==2&&d<=19)) return 'Wassermann';
        if ((m==2&&d>=20)||(m==3&&d<=20)) return 'Fische';
        if ((m==3&&d>=21)||(m==4&&d<=20)) return 'Widder';
        if ((m==4&&d>=21)||(m==5&&d<=20)) return 'Stier';
        if ((m==5&&d>=21)||(m==6&&d<=21)) return 'Zwillinge';
        if ((m==6&&d>=22)||(m==7&&d<=22)) return 'Krebs';
        if ((m==7&&d>=23)||(m==8&&d<=23)) return 'Löwe';
        if ((m==8&&d>=24)||(m==9&&d<=23)) return 'Jungfrau';
        if ((m==9&&d>=24)||(m==10&&d<=23)) return 'Waage';
        if ((m==10&&d>=24)||(m==11&&d<=22)) return 'Skorpion';
        if ((m==11&&d>=23)||(m==12&&d<=21)) return 'Schütze';
        return 'Steinbock';
    }

    function clearAllTimeouts() {
        speechTimeouts.forEach(clearTimeout);
        speechTimeouts = [];
        window.speechSynthesis.cancel();
    }

    function setDisplay(main, sub) {
        displayArea.innerHTML = `${main}${sub ? '<br><small style="font-size:15px;font-weight:normal;color:var(--text-color-light);">' + sub + '</small>' : ''}`;
    }

    // ── GENERATE DATE ──────────────────────────────────────
    function generateRandomDate() {
        const s = new Date(document.getElementById('start-date').value);
        const e = new Date(document.getElementById('end-date').value);
        if (!s || !e || isNaN(s) || isNaN(e)) { alert('Bitte Datumsbereich angeben.'); return; }
        if (s >= e) { alert('Anfangsdatum muss vor dem Enddatum liegen.'); return; }

        randomDate = new Date(s.getTime() + Math.random() * (e.getTime() - s.getTime()));
        currentStep = 0;
        setupView.style.display = 'none';
        resultView.style.display = 'block';
        btnNext.disabled = false;
        btnNext.textContent = 'Nächster Schritt';

        if (enableSpeechChk.checked) {
            startSpeechSequence();
        } else {
            setDisplay('Bereit!', 'Klicke auf "Nächster Schritt"');
        }
    }

    // ── SPEECH SEQUENCE ────────────────────────────────────
    function startSpeechSequence() {
        clearAllTimeouts();
        btnNext.disabled = true;
        displayArea.textContent = 'Sprachausgabe startet...';

        const dl = {
            initial:    getDelay('delay-initial'),
            yearMonth:  getDelay('delay-year-month'),
            monthDay:   getDelay('delay-month-day'),
            dayWeekday: getDelay('delay-day-weekday'),
            weekdayDays:getDelay('delay-weekday-days'),
            digit:      getDelay('delay-digit'),
        };

        const year    = randomDate.getFullYear().toString();
        const month   = randomDate.toLocaleString('de-DE', { month: 'long' });
        const day     = randomDate.getDate().toString();
        const weekday = randomDate.toLocaleString('de-DE', { weekday: 'long' });
        const diff    = daysBetween(randomDate);
        const diffStr = diff.toString();
        const zodiac  = getZodiacSign(randomDate);
        const showZod = document.getElementById('show-zodiac').checked;

        let t = 0;

        t += dl.initial;
        speechTimeouts.push(setTimeout(() => { setDisplay(year); speak(year); }, t));

        t += dl.yearMonth;
        speechTimeouts.push(setTimeout(() => { setDisplay(month); speak(month); }, t));

        t += dl.monthDay;
        speechTimeouts.push(setTimeout(() => { setDisplay(day); speak(day); }, t));

        t += dl.dayWeekday;
        speechTimeouts.push(setTimeout(() => { setDisplay(weekday); speak(weekday); }, t));

        t += dl.weekdayDays;
        speechTimeouts.push(setTimeout(() => {
            setDisplay(diff, 'Tage vergangen');
            diffStr.split('').forEach((digit, i) => {
                speechTimeouts.push(setTimeout(() => speak(digit), (i + 1) * dl.digit));
            });
        }, t));

        t += Math.max(dl.weekdayDays, diffStr.length * dl.digit) + 1000;

        if (showZod) {
            speechTimeouts.push(setTimeout(() => { setDisplay(zodiac); speak(zodiac); }, t));
            t += 3000;
        }

        speechTimeouts.push(setTimeout(endSequence, t));
    }

    // ── MANUAL SEQUENCE ────────────────────────────────────
    function showNextStep() {
        currentStep++;
        const showZod = document.getElementById('show-zodiac').checked;
        let last = false;

        switch (currentStep) {
            case 1: setDisplay(randomDate.getFullYear()); break;
            case 2: setDisplay(randomDate.toLocaleString('de-DE', { month: 'long' })); break;
            case 3: setDisplay(randomDate.getDate()); break;
            case 4: setDisplay(randomDate.toLocaleString('de-DE', { weekday: 'long' })); break;
            case 5:
                setDisplay(daysBetween(randomDate), 'Tage vergangen');
                if (!showZod) last = true;
                break;
            case 6:
                if (showZod) { setDisplay(getZodiacSign(randomDate)); last = true; }
                else { endSequence(); return; }
                break;
            default: endSequence(); return;
        }
        if (last) { btnNext.textContent = 'Fertig'; btnNext.disabled = true; }
    }

    // ── END ────────────────────────────────────────────────
    function endSequence() {
        setDisplay('✓ Sequenz beendet', 'Auf "Zurücksetzen" klicken');
        btnNext.disabled = true;
        btnNext.textContent = 'Nächster Schritt';
    }

    function resetApp() {
        clearAllTimeouts();
        currentStep = 0;
        randomDate  = null;
        setupView.style.display  = 'block';
        resultView.style.display = 'none';
        btnNext.disabled = false;
        btnNext.textContent = 'Nächster Schritt';
        setDisplay('Warte auf Eingabe...');
    }
});

// ── TAB NAVIGATION ─────────────────────────────────────
function openTab(evt, tabName) {
    document.querySelectorAll('.tab-pane').forEach(p => p.style.display = 'none');
    document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
    document.getElementById(tabName).style.display = 'block';
    evt.currentTarget.classList.add('active');
}
</script>

</body>
</html>
