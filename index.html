<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synaptic Tester</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --mode-label: 'Dunkel';
            --ease: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --glass-bg: rgba(0,0,0,0.45);
            --glass-border: rgba(255,255,255,0.10);
            --glass-shadow: 0 8px 40px rgba(0,0,0,0.7);
            --glass-blur: blur(28px) saturate(160%);
            --glass-btn: rgba(255,255,255,0.08);
            --glass-btn-hover: rgba(255,255,255,0.14);
            --glass-input: rgba(255,255,255,0.06);
            --glass-display: rgba(0,0,0,0.45);
            --text: rgba(255,255,255,0.92);
            --text-light: rgba(255,255,255,0.40);
            --accent: #4dabf7;
            --accent2: #74c7ec;
            --red: #ff6b6b;
            --green: #51cf66;
            --tab-active: rgba(255,255,255,0.12);
        }

        body.light-mode {
            --glass-bg: rgba(255,255,255,0.12);
            --glass-border: rgba(255,255,255,0.15);
            --glass-shadow: 0 8px 40px rgba(0,0,0,0.4);
            --glass-btn: rgba(255,255,255,0.10);
            --glass-btn-hover: rgba(255,255,255,0.18);
            --glass-input: rgba(255,255,255,0.08);
            --glass-display: rgba(255,255,255,0.08);
            --text: rgba(255,255,255,0.95);
            --text-light: rgba(255,255,255,0.55);
            --tab-active: rgba(255,255,255,0.15);
        }
        body.light-mode {
            background:
                radial-gradient(ellipse at 20% 20%, #1a3a6e 0%, transparent 55%),
                radial-gradient(ellipse at 80% 10%, #2a1a5e 0%, transparent 50%),
                radial-gradient(ellipse at 60% 80%, #0a2a4a 0%, transparent 50%),
                linear-gradient(135deg, #0f1f3d 0%, #1a1030 50%, #0f1f3d 100%);
        }
        body.light-mode .input-group select option { background: #f0f4ff; color: #111; }
        body.light-mode .app-header { background: rgba(255,255,255,0.4); border-bottom-color: rgba(0,0,0,0.08); }
        body.light-mode .tabs { background: rgba(255,255,255,0.4); border-bottom-color: rgba(0,0,0,0.08); }
        body.light-mode .tab-button { color: rgba(0,0,0,0.45); }
        body.light-mode .tab-button.active { background: rgba(0,0,0,0.08); color: rgba(0,0,0,0.88); border-color: rgba(0,0,0,0.12); box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
        body.light-mode #vier-gewinnt-board { background: rgba(30,80,200,0.08); border-color: rgba(77,171,247,0.3); }
        body.light-mode .cell { background: rgba(0,0,0,0.08); border-color: rgba(0,0,0,0.08); }
        body.light-mode .column-btn { background: rgba(0,0,0,0.08); border-color: rgba(0,0,0,0.15); color: #111; }
        body.light-mode .column-btn:hover { background: rgba(0,0,0,0.15); }
        body {

            flex-direction: column;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px 60px;
            background:
                radial-gradient(ellipse at 20% 20%, #0d3a7a 0%, transparent 55%),
                radial-gradient(ellipse at 80% 10%, #2d0a6e 0%, transparent 50%),
                radial-gradient(ellipse at 60% 80%, #04385a 0%, transparent 50%),
                radial-gradient(ellipse at 10% 90%, #050d1f 0%, transparent 50%),
                linear-gradient(135deg, #030810 0%, #060f22 50%, #030810 100%);
            background-attachment: fixed;
        }

        .app-container {
            width: 100%;
            max-width: 580px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            box-shadow: var(--glass-shadow), inset 0 1px 0 rgba(255,255,255,0.3);
            overflow: hidden;
            transition: var(--ease);
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 24px 14px;
            background: rgba(0,0,0,0.35);
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }

        .app-header span {
            font-size: 17px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.3px;
        }

        #theme-toggle {
            min-width: 80px;
            text-align: center;
            background: var(--glass-btn);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            color: var(--text);
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: var(--ease);
        }
        #theme-toggle:hover { background: var(--glass-btn-hover); }

        .tabs {
            display: flex;
            background: rgba(0,0,0,0.35);
            border-bottom: 1px solid rgba(255,255,255,0.07);
            padding: 6px 8px;
            gap: 4px;
        }

        .tab-button {
            flex: 1;
            padding: 9px 6px;
            border: none;
            background: transparent;
            color: var(--text-light);
            font-size: 12px;
            font-weight: 500;
            border-radius: 14px;
            cursor: pointer;
            transition: var(--ease);
            letter-spacing: -0.1px;
        }
        .tab-button.active {
            background: var(--tab-active);
            color: var(--text);
            font-weight: 600;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
        }

        .tab-content { padding: 24px; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }

        h2 {
            margin: 0 0 20px;
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.5px;
        }

        .input-group { margin-bottom: 16px; }
        .input-group label {
            display: block;
            margin-bottom: 7px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-light);
            letter-spacing: 0.1px;
        }
        .input-group input[type="date"],
        .input-group input[type="number"],
        .input-group select {
            width: 100%;
            padding: 11px 14px;
            background: var(--glass-input);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 14px;
            color: var(--text);
            font-size: 15px;
            font-family: inherit;
            backdrop-filter: blur(10px);
            transition: var(--ease);
            -webkit-appearance: none;
            appearance: none;
        }
        .input-group input[type="number"] { width: 90px; }
        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255,255,255,0.15);
            box-shadow: 0 0 0 3px rgba(77,171,247,0.2);
        }
        .input-group select option { background: #1a2a4a; color: white; }

        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 14px;
            cursor: pointer;
            gap: 10px;
        }
        .checkbox-group input[type="checkbox"] {
            width: 20px; height: 20px;
            accent-color: var(--accent);
            cursor: pointer;
            border-radius: 6px;
        }
        .checkbox-group label {
            font-size: 14px;
            color: var(--text);
            cursor: pointer;
            font-weight: 400;
        }

        .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }

        button {
            padding: 13px 18px;
            font-size: 15px;
            font-weight: 600;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            cursor: pointer;
            transition: var(--ease);
            color: white;
            font-family: inherit;
            letter-spacing: -0.2px;
            backdrop-filter: blur(10px);
        }
        button:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }
        button:active:not(:disabled) { transform: scale(0.97); }

        #btn-generate, #btn-next {
            background: linear-gradient(135deg, rgba(77,171,247,0.6), rgba(116,199,236,0.4));
            border-color: rgba(77,171,247,0.4);
        }
        #btn-generate:hover:not(:disabled), #btn-next:hover:not(:disabled) {
            background: linear-gradient(135deg, rgba(77,171,247,0.8), rgba(116,199,236,0.6));
        }
        #btn-reset {
            background: var(--glass-btn);
        }
        #btn-reset:hover { background: var(--glass-btn-hover); }

        .btn-primary {
            background: linear-gradient(135deg, rgba(77,171,247,0.6), rgba(116,199,236,0.4));
            border-color: rgba(77,171,247,0.4);
        }
        .btn-primary:hover:not(:disabled) {
            background: linear-gradient(135deg, rgba(77,171,247,0.8), rgba(116,199,236,0.6));
        }
        .btn-dark {
            background: rgba(0,0,0,0.3);
            border-color: rgba(255,255,255,0.12);
            color: white;
        }
        .btn-dark:hover:not(:disabled) { background: rgba(0,0,0,0.45); }

        #display-area {
            margin-top: 20px;
            padding: 24px;
            background: var(--glass-display);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px;
            min-height: 70px;
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            backdrop-filter: blur(10px);
            letter-spacing: -0.5px;
        }

        #speech-settings {
            display: none;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 16px;
            padding: 16px;
            margin-top: 10px;
        }
        #speech-settings h4 { color: var(--text); font-size: 14px; margin-bottom: 14px; }
        #speech-settings .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        #speech-settings .input-group { font-size: 13px; margin-bottom: 4px; }

        /* GLASS DISPLAY BOX */
        .glass-display {
            margin: 16px 0;
            padding: 16px;
            background: var(--glass-display);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px;
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            color: var(--text);
            min-height: 2.2em;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        /* VIER GEWINNT */
        .vier-gewinnt-controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px,1fr));
            gap: 12px;
            margin-bottom: 16px;
        }
        #vier-gewinnt-status {
            margin: 14px 0;
            padding: 14px;
            background: var(--glass-display);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            color: var(--text);
            min-height: 2em;
            backdrop-filter: blur(10px);
        }
        #vier-gewinnt-column-buttons {
            display: grid;
            grid-template-columns: repeat(7,1fr);
            gap: 5px;
            margin-bottom: 8px;
        }
        .column-btn {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 10px;
            aspect-ratio: 1;
            font-size: 13px;
            font-weight: 700;
            color: white;
            backdrop-filter: blur(8px);
        }
        .column-btn:hover { background: rgba(255,255,255,0.22); }
        #vier-gewinnt-board {
            display: grid;
            grid-template-columns: repeat(7,1fr);
            gap: 5px;
            background: rgba(0,40,120,0.25);
            border: 1px solid rgba(77,171,247,0.2);
            padding: 10px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08);
        }
        .cell {
            aspect-ratio: 1;
            background: rgba(0,0,0,0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .cell .piece {
            width: 85%; height: 85%;
            border-radius: 50%;
            animation: drop 0.3s cubic-bezier(0.25,0.46,0.45,0.94);
        }
        .cell .piece.player1 {
            background: radial-gradient(circle at 35% 35%, #ffe066, #f59f00);
            box-shadow: 0 2px 8px rgba(255,180,0,0.5), inset 0 -3px 4px rgba(0,0,0,0.2);
        }
        .cell .piece.player2 {
            background: radial-gradient(circle at 35% 35%, #ff8787, #e03131);
            box-shadow: 0 2px 8px rgba(255,80,80,0.5), inset 0 -3px 4px rgba(0,0,0,0.2);
        }
        .cell.win .piece { animation: pulse 0.6s infinite; }
        @keyframes drop { from{transform:translateY(-180px);opacity:0} to{transform:translateY(0);opacity:1} }
        @keyframes pulse { 0%{transform:scale(0.88)} 50%{transform:scale(1.1)} 100%{transform:scale(0.88)} }

        /* PI */
        #pi-status {
            margin: 16px 0;
            padding: 20px;
            background: var(--glass-display);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px;
            font-size: 42px;
            font-weight: 800;
            text-align: center;
            color: var(--text);
            min-height: 2em;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: -1px;
            backdrop-filter: blur(10px);
        }
        #pi-context-box {
            display: none;
            margin-top: 10px;
            padding: 16px;
            background: var(--glass-display);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 15px;
            line-height: 2;
            word-break: break-all;
            color: var(--text);
            backdrop-filter: blur(10px);
        }

        /* KREDITKARTE */
        #cc-status {
            margin: 16px 0;
            padding: 20px;
            background: var(--glass-display);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px;
            font-size: 36px;
            font-weight: 800;
            text-align: center;
            color: var(--text);
            min-height: 2em;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: -1px;
            backdrop-filter: blur(10px);
        }
        #cc-answer-box {
            display: none;
            margin: 12px 0;
            padding: 20px;
            background: rgba(255,107,107,0.15);
            border: 1px solid rgba(255,107,107,0.35);
            border-radius: 18px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        #cc-answer {
            font-size: 72px;
            font-weight: 900;
            color: var(--red);
            letter-spacing: -2px;
            text-shadow: 0 0 30px rgba(255,107,107,0.5);
        }
        #cc-number-box {
            display: none;
            margin-top: 8px;
            padding: 16px;
            background: var(--glass-display);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            font-family: 'SF Mono', monospace;
            font-size: 19px;
            letter-spacing: 3px;
            text-align: center;
            color: var(--text);
            word-break: break-all;
            backdrop-filter: blur(10px);
        }

        /* SEPARATOR */
        .section-sep {
            height: 1px;
            background: rgba(255,255,255,0.08);
            margin: 16px 0;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="app-header">
        <span>Synaptic Tester v1.4</span>
        <button id="theme-toggle">Theme</button>
    </div>
    <div class="tabs">
        <button class="tab-button active" onclick="openTab(event,'date-function')">Calendar Prodigy</button>
        <button class="tab-button" onclick="openTab(event,'vier-gewinnt')">Vier Gewinnt</button>
        <button class="tab-button" onclick="openTab(event,'pi-tab')">Pi</button>
        <button class="tab-button" onclick="openTab(event,'cc-tab')">Kreditkarte</button>
    </div>

    <div id="date-function" class="tab-content tab-pane active">
        <h2>Zuf&auml;lliges Datum</h2>
        <div id="setup-view">
            <div class="input-group">
                <label for="start-date">Anfangsdatum</label>
                <input type="date" id="start-date" value="1950-01-01">
            </div>
            <div class="input-group">
                <label for="end-date">Enddatum</label>
                <input type="date" id="end-date">
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="show-zodiac">
                <label for="show-zodiac">Optional: Sternzeichen anzeigen</label>
            </div>
            <div class="checkbox-group" style="margin-top:20px;">
                <input type="checkbox" id="enable-speech">
                <label for="enable-speech">Sprachausgabe aktivieren</label>
            </div>
            <div id="speech-settings">
                <h4>Pausen f&uuml;r Sprachausgabe (Sekunden)</h4>
                <div class="grid">
                    <div class="input-group"><label for="delay-initial">Start</label><input type="number" id="delay-initial" value="5" min="0"></div>
                    <div class="input-group"><label for="delay-year-month">nach Jahr</label><input type="number" id="delay-year-month" value="10" min="0"></div>
                    <div class="input-group"><label for="delay-month-day">nach Monat</label><input type="number" id="delay-month-day" value="10" min="0"></div>
                    <div class="input-group"><label for="delay-day-weekday">nach Tag</label><input type="number" id="delay-day-weekday" value="10" min="0"></div>
                    <div class="input-group"><label for="delay-weekday-days">nach Wochentag</label><input type="number" id="delay-weekday-days" value="10" min="0"></div>
                    <div class="input-group"><label for="delay-digit">zw. Ziffern</label><input type="number" id="delay-digit" value="3" min="0"></div>
                </div>
            </div>
            <button id="btn-generate" class="btn-primary" style="width:100%;margin-top:16px;">Zuf&auml;lliges Datum generieren</button>
        </div>
        <div id="result-view" style="display:none;">
            <div id="display-area">Warte auf Eingabe...</div>
            <div class="button-group">
                <button id="btn-next">N&auml;chster Schritt</button>
                <button id="btn-reset">Zur&uuml;cksetzen</button>
            </div>
        </div>
    </div>

    <div id="vier-gewinnt" class="tab-content tab-pane">
        <h2>Vier Gewinnt</h2>
        <div class="vier-gewinnt-controls">
            <div class="input-group">
                <label for="vier-gewinnt-starter">Wer beginnt?</label>
                <select id="vier-gewinnt-starter">
                    <option value="user">Benutzer</option>
                    <option value="app" selected>App</option>
                </select>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="vier-gewinnt-show-board">
                <label for="vier-gewinnt-show-board">Spielfeld anzeigen</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="vier-gewinnt-speech">
                <label for="vier-gewinnt-speech">Sprachausgabe f&uuml;r App</label>
            </div>
        </div>
        <div id="vier-gewinnt-status">W&auml;hle die Optionen und starte eine neue Runde.</div>
        <div id="vier-gewinnt-column-buttons"></div>
        <div id="vier-gewinnt-board"></div>
        <button id="vier-gewinnt-reset" class="btn-dark" style="width:100%;margin-top:20px;">Neues Spiel</button>
    </div>

    <!-- TAB 4: KREDITKARTE -->
    <div id="cc-tab" class="tab-content tab-pane">
        <h2>Kreditkarte</h2>

        <div class="input-group">
            <label for="cc-delay">Pause zwischen Ziffern (Sekunden)</label>
            <input type="number" id="cc-delay" value="3" min="1" max="15" style="width:80px;">
        </div>

        <button id="cc-main-btn" class="btn-primary" style="color:white;" style="width:100%;">Karte generieren</button>
        <button id="cc-reset-btn" class="btn-dark" style="width:100%;margin-top:10px;">Neu starten</button>

        <div id="cc-status" style="margin:20px 0;padding:15px;background-color:var(--display-bg);border-radius:6px;font-size:16px;font-weight:bold;text-align:center;color:white;min-height:2em;display:flex;align-items:center;justify-content:center;">Bereit.</div>

        <div id="cc-answer-box" style="display:none;margin:10px 0;padding:20px;background-color:var(--display-bg);border-radius:6px;text-align:center;">
            <div style="font-size:13px;color:var(--text-color-light);margin-bottom:6px;">Fehlende Ziffer</div>
            <div id="cc-answer" style="font-size:64px;font-weight:900;color:#dc3545;"></div>
        </div>

        <div class="checkbox-group" style="margin-top:10px;">
            <input type="checkbox" id="cc-show-number">
            <label for="cc-show-number">Nummer anzeigen</label>
        </div>
        <div id="cc-number-box" style="display:none;margin-top:5px;padding:15px;background-color:var(--display-bg);border-radius:6px;font-family:monospace;font-size:20px;letter-spacing:3px;text-align:center;color:white;word-break:break-all;"></div>
    </div>

    <div id="pi-tab" class="tab-content tab-pane">
        <h2>Pi &ndash; Ziffernfolge</h2>
        <div class="input-group">
            <label for="pi-direction">Leserichtung</label>
            <select id="pi-direction">
                <option value="random" selected>Zuf&auml;llig</option>
                <option value="forward">Vorw&auml;rts</option>
                <option value="backward">R&uuml;ckw&auml;rts</option>
            </select>
        </div>
        <div class="input-group">
            <label for="pi-digit-delay">Pause zwischen Ziffern (Sekunden)</label>
            <input type="number" id="pi-digit-delay" value="5" min="1" max="30" style="width:80px;">
        </div>
        <button id="pi-start" class="btn-primary" style="width:100%;">Ziffernfolge w&auml;hlen &amp; starten</button>
        <button id="pi-stop" class="btn-dark" style="width:100%;margin-top:10px;display:none;">Stoppen</button>
        <div id="pi-status">Bereit.</div>
        <div class="checkbox-group" style="margin-top:10px;">
            <input type="checkbox" id="pi-show-context">
            <label for="pi-show-context">Zahlen anzeigen</label>
        </div>
        <div id="pi-context-box"></div>
    </div>

</div>

<div style="text-align:center;padding:16px 24px 20px;width:100%;max-width:580px;">
    <a href="https://conjuringlab.com/product/synaptic" target="_blank" style="display:inline-block;padding:9px 22px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:20px;color:rgba(255,255,255,0.45);font-size:12px;font-weight:500;text-decoration:none;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;letter-spacing:0.2px;transition:all 0.3s ease;" onmouseover="this.style.background='rgba(255,255,255,0.11)';this.style.color='rgba(255,255,255,0.7)'" onmouseout="this.style.background='rgba(255,255,255,0.06)';this.style.color='rgba(255,255,255,0.45)'">Synaptic kaufen</a>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {

    const themeBtn = document.getElementById('theme-toggle');
        themeBtn.textContent = 'Dunkel';
        let isLight = false;
        themeBtn.addEventListener('click', () => {
            isLight = !isLight;
            document.body.classList.toggle('light-mode', isLight);
            themeBtn.textContent = isLight ? 'Hell' : 'Dunkel';
        });

    function speak(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'de-DE';
            window.speechSynthesis.speak(u);
        }
    }

    // CALENDAR PRODIGY
    const today = new Date();
    document.getElementById('end-date').value = today.toISOString().split('T')[0];
    const todayDateOnly = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    let currentStep = 0, randomDate = null, speechTimeouts = [];
    const btnGenerate = document.getElementById('btn-generate');
    const btnNext = document.getElementById('btn-next');
    const btnReset = document.getElementById('btn-reset');
    const displayArea = document.getElementById('display-area');
    const setupView = document.getElementById('setup-view');
    const resultView = document.getElementById('result-view');
    const enableSpeechCheck = document.getElementById('enable-speech');
    const speechSettings = document.getElementById('speech-settings');

    btnGenerate.addEventListener('click', generateRandomDate);
    btnNext.addEventListener('click', showNextStep);
    btnReset.addEventListener('click', resetApp);
    enableSpeechCheck.addEventListener('change', () => {
        speechSettings.style.display = enableSpeechCheck.checked ? 'block' : 'none';
        if (!enableSpeechCheck.checked) clearAllTimeouts();
    });

    function generateRandomDate() {
        const s = new Date(document.getElementById('start-date').value);
        const e = new Date(document.getElementById('end-date').value);
        if (!s || !e || s >= e) { alert('Bitte g\u00fcltige Daten eingeben.'); return; }
        randomDate = new Date(s.getTime() + Math.random() * (e.getTime() - s.getTime()));
        currentStep = 0;
        setupView.style.display = 'none';
        resultView.style.display = 'block';
        btnNext.disabled = false;
        if (enableSpeechCheck.checked) startSpeechSequence();
        else displayArea.innerHTML = 'Bereit!<br><small style="font-size:14px;font-weight:normal;color:var(--text-color-light);">Klicke auf N\u00e4chster Schritt</small>';
    }

    function startSpeechSequence() {
        btnNext.disabled = true;
        displayArea.textContent = 'Sprachausgabe startet...';
        const d = {
            initial: parseInt(document.getElementById('delay-initial').value)*1000,
            yearMonth: parseInt(document.getElementById('delay-year-month').value)*1000,
            monthDay: parseInt(document.getElementById('delay-month-day').value)*1000,
            dayWeekday: parseInt(document.getElementById('delay-day-weekday').value)*1000,
            weekdayDays: parseInt(document.getElementById('delay-weekday-days').value)*1000,
            digit: parseInt(document.getElementById('delay-digit').value)*1000
        };
        const year = randomDate.getFullYear().toString();
        const month = randomDate.toLocaleString('de-DE',{month:'long'});
        const day = randomDate.getDate().toString();
        const weekday = randomDate.toLocaleString('de-DE',{weekday:'long'});
        const timeDiff = todayDateOnly - new Date(randomDate.getFullYear(),randomDate.getMonth(),randomDate.getDate());
        const dayDiff = Math.floor(timeDiff/(1000*3600*24));
        const dayDiffStr = dayDiff.toString();
        const showZodiac = document.getElementById('show-zodiac').checked;
        clearAllTimeouts();
        let delay = 0;
        [[d.initial,year,year],[d.yearMonth,month,month],[d.monthDay,day,day],[d.dayWeekday,weekday,weekday],
         [d.weekdayDays,'',`${dayDiff}<br><small style='font-size:14px;color:var(--text-color-light);'>Tage vergangen</small>`]
        ].forEach(([wait,txt,html]) => {
            delay += wait;
            speechTimeouts.push(setTimeout(() => { displayArea.innerHTML = html; if(txt) speak(txt); }, delay));
        });
        dayDiffStr.split('').forEach(digit => {
            delay += d.digit;
            speechTimeouts.push(setTimeout(() => { speak(digit); }, delay));
        });
        if (showZodiac) {
            delay += Math.max(d.weekdayDays, d.digit * dayDiffStr.length + 2000);
            const z = getZodiacSign(randomDate);
            speechTimeouts.push(setTimeout(() => { displayArea.textContent = z; speak(z); }, delay));
        }
        speechTimeouts.push(setTimeout(endSequence, delay + 2000));
    }

    function showNextStep() {
        currentStep++;
        const showZodiac = document.getElementById('show-zodiac').checked;
        let content='', subtext='', isLast=false;
        switch(currentStep) {
            case 1: content = randomDate.getFullYear(); break;
            case 2: content = randomDate.toLocaleString('de-DE',{month:'long'}); break;
            case 3: content = randomDate.getDate(); break;
            case 4: content = randomDate.toLocaleString('de-DE',{weekday:'long'}); break;
            case 5:
                const td = todayDateOnly - new Date(randomDate.getFullYear(),randomDate.getMonth(),randomDate.getDate());
                content = Math.floor(td/(1000*3600*24)); subtext='Tage vergangen';
                if(!showZodiac) isLast=true; break;
            case 6:
                if(showZodiac){content=getZodiacSign(randomDate);isLast=true;}else{endSequence();return;} break;
            default: endSequence(); return;
        }
        displayArea.innerHTML = `${content}<br><small style='font-size:14px;font-weight:normal;color:var(--text-color-light);'>${subtext}</small>`;
        if(isLast){btnNext.textContent='Fertig';btnNext.disabled=true;}
    }

    function endSequence() {
        displayArea.innerHTML='Sequenz beendet.<br><small style="font-size:14px;font-weight:normal;color:var(--text-color-light);">Auf Zur\u00fccksetzen klicken.</small>';
        btnNext.disabled=true; btnNext.textContent='N\u00e4chster Schritt';
    }
    function clearAllTimeouts() { speechTimeouts.forEach(t=>clearTimeout(t)); speechTimeouts=[]; window.speechSynthesis.cancel(); }
    function resetApp() {
        clearAllTimeouts(); currentStep=0; randomDate=null;
        setupView.style.display='block'; resultView.style.display='none';
        displayArea.textContent='Warte auf Eingabe...'; btnNext.disabled=false; btnNext.textContent='N\u00e4chster Schritt';
    }
    function getZodiacSign(date) {
        const day=date.getDate(), m=date.getMonth()+1;
        if((m==1&&day>=21)||(m==2&&day<=19)) return'Wassermann';
        if((m==2&&day>=20)||(m==3&&day<=20)) return'Fische';
        if((m==3&&day>=21)||(m==4&&day<=20)) return'Widder';
        if((m==4&&day>=21)||(m==5&&day<=20)) return'Stier';
        if((m==5&&day>=21)||(m==6&&day<=21)) return'Zwillinge';
        if((m==6&&day>=22)||(m==7&&day<=22)) return'Krebs';
        if((m==7&&day>=23)||(m==8&&day<=23)) return'L\u00f6we';
        if((m==8&&day>=24)||(m==9&&day<=23)) return'Jungfrau';
        if((m==9&&day>=24)||(m==10&&day<=23)) return'Waage';
        if((m==10&&day>=24)||(m==11&&day<=22)) return'Skorpion';
        if((m==11&&day>=23)||(m==12&&day<=21)) return'Sch\u00fctze';
        return'Steinbock';
    }

    // VIER GEWINNT
    const ROWS=6, COLS=7, PLAYER1='user', PLAYER2='app';
    let board=[], lastWinDirection='', currentPlayer, gameOver=false, moveCount=0;
    const boardEl = document.getElementById('vier-gewinnt-board');
    const colBtnsEl = document.getElementById('vier-gewinnt-column-buttons');
    const vgStatus = document.getElementById('vier-gewinnt-status');
    const vgResetBtn = document.getElementById('vier-gewinnt-reset');
    const starterSel = document.getElementById('vier-gewinnt-starter');
    const showBoardChk = document.getElementById('vier-gewinnt-show-board');
    const vgSpeechChk = document.getElementById('vier-gewinnt-speech');

    vgResetBtn.addEventListener('click', initVierGewinnt);
    showBoardChk.addEventListener('change', () => { boardEl.style.display = showBoardChk.checked ? 'grid' : 'none'; });

    function initVierGewinnt() {
        gameOver=false; moveCount=0; currentPlayer=starterSel.value;
        board=Array(ROWS).fill(null).map(()=>Array(COLS).fill(null));
        renderBoard(); renderColumnButtons();
        vgStatus.textContent=`Spiel gestartet. ${currentPlayer===PLAYER1?'Du bist':'Die App ist'} am Zug.`;
        if(currentPlayer===PLAYER2){disableColBtns(true);setTimeout(appMove,1000);}
        else disableColBtns(false);
    }
    function renderBoard() {
        boardEl.innerHTML='';
        boardEl.style.display=showBoardChk.checked?'grid':'none';
        for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
            const cell=document.createElement('div'); cell.classList.add('cell');
            cell.dataset.row=r; cell.dataset.col=c;
            if(board[r][c]){const p=document.createElement('div');p.classList.add('piece',board[r][c]===PLAYER1?'player1':'player2');cell.appendChild(p);}
            boardEl.appendChild(cell);
        }
    }
    function renderColumnButtons() {
        colBtnsEl.innerHTML='';
        for(let c=0;c<COLS;c++){
            const btn=document.createElement('button'); btn.classList.add('column-btn');
            btn.dataset.col=c; btn.textContent='\u2193 '+(c+1);
            btn.addEventListener('click',handleColClick); colBtnsEl.appendChild(btn);
        }
    }
    function handleColClick(e) {
        if(gameOver||currentPlayer!==PLAYER1) return;
        const col=parseInt(e.target.dataset.col), row=findLowestRow(col);
        if(row!==-1) dropPiece(row,col,PLAYER1);
    }
    function dropPiece(row,col,player) {
        board[row][col]=player; moveCount++;
        const cell=boardEl.querySelector(`.cell[data-row='${row}'][data-col='${col}']`);
        const piece=document.createElement('div'); piece.classList.add('piece',player===PLAYER1?'player1':'player2');
        cell.appendChild(piece);
        if(checkWin(player)){endGame(player);return;}
        if(isBoardFull()){endGame(null);return;}
        switchPlayer();
    }
    function findLowestRow(col) {
        for(let r=ROWS-1;r>=0;r--) if(board[r][col]===null) return r;
        return -1;
    }
    function switchPlayer() {
        currentPlayer=currentPlayer===PLAYER1?PLAYER2:PLAYER1;
        vgStatus.textContent=`${currentPlayer===PLAYER1?'Du bist':'Die App ist'} am Zug.`;
        if(currentPlayer===PLAYER2){disableColBtns(true);setTimeout(appMove,1200);}
        else disableColBtns(false);
    }
    function appMove() {
        if(gameOver) return;
        const avail=[]; for(let c=0;c<COLS;c++) if(board[0][c]===null) avail.push(c);
        if(avail.length>0){
            const col=avail[Math.floor(Math.random()*avail.length)], row=findLowestRow(col);
            if(vgSpeechChk.checked) speak(`Ich setze in Spalte ${col+1}.`);
            dropPiece(row,col,PLAYER2);
        }
    }
    function checkWin(player) {
        const ok=(a,b,c,d)=>a!==null&&a===b&&a===c&&a===d;
        for(let r=0;r<ROWS;r++) for(let c=0;c<=COLS-4;c++)
            if(ok(board[r][c],board[r][c+1],board[r][c+2],board[r][c+3])&&board[r][c]===player)
                {lastWinDirection='Horizontal.';highlightWin([[r,c],[r,c+1],[r,c+2],[r,c+3]]);return true;}
        for(let c=0;c<COLS;c++) for(let r=0;r<=ROWS-4;r++)
            if(ok(board[r][c],board[r+1][c],board[r+2][c],board[r+3][c])&&board[r][c]===player)
                {lastWinDirection='Vertikal.';highlightWin([[r,c],[r+1,c],[r+2,c],[r+3,c]]);return true;}
        for(let r=0;r<=ROWS-4;r++) for(let c=0;c<=COLS-4;c++)
            if(ok(board[r][c],board[r+1][c+1],board[r+2][c+2],board[r+3][c+3])&&board[r][c]===player)
                {lastWinDirection='Diagonal.';highlightWin([[r,c],[r+1,c+1],[r+2,c+2],[r+3,c+3]]);return true;}
        for(let r=3;r<ROWS;r++) for(let c=0;c<=COLS-4;c++)
            if(ok(board[r][c],board[r-1][c+1],board[r-2][c+2],board[r-3][c+3])&&board[r][c]===player)
                {lastWinDirection='Diagonal.';highlightWin([[r,c],[r-1,c+1],[r-2,c+2],[r-3,c+3]]);return true;}
        return false;
    }
    function highlightWin(cells) { cells.forEach(([r,c])=>{const el=boardEl.querySelector(`.cell[data-row='${r}'][data-col='${c}']`);if(el)el.classList.add('win');}); }
    function isBoardFull() { return board[0].every(c=>c!==null); }
    function endGame(winner) {
        gameOver=true; disableColBtns(true);
        let msg='';
        if(winner){
            msg=`${winner===PLAYER1?'Du hast':'Die App hat'} gewonnen! ${lastWinDirection} (${moveCount} Züge)`;
            vgStatus.textContent=msg;
            if(vgSpeechChk.checked) speak(msg);
        } else { msg=`Unentschieden! (${moveCount} Züge)`; vgStatus.textContent=msg; if(vgSpeechChk.checked) speak(msg); }
    }
    function disableColBtns(disabled) { colBtnsEl.querySelectorAll('.column-btn').forEach(b=>b.disabled=disabled); }
    initVierGewinnt();

    // PI
    const PI_DIGITS='31415926535897932384626433832795028841971693993751058209749445923078164062862089986280348253421170679821480865132823066470938446095505822317253594081284811174502841027019385211055596446229489549303819644288109756659334461284756482337867831652712019091456485669234603486104543266482133936072602491412737245870066063155881748815209209628292540917153643678925903600113305305488204665213841469519415116094330572703657595919530921861173819326117931051185480744623799627495673518857527248912279381830119491298336733624406566430860213949463952247371907021798609437027705392171762931767523846748184676694051320005681271452635608277857713427577896091736371787214684409012249534301465495853710507922796892589235420199561121290219608640344181598136297747713099605187072113499999983729780499510597317328160963185950244594553469083026425223082533446850352619311881710100031378387528865875332083814206171776691473035982534904287554687311595628638823537875937519577818577805321712268066130019278766111959092164201989380952572010654858632788659361533818279682303019520353018529689957736225994138912497217752834791315155748572424541506959508295331168617278558890750983817546374649393192550604009277016711390098488240128583616035637076601047101819429555961989467678374494482553797747268471040475346462080466842590694912933136770289891521047521620569660240580381501935112533824300355876402474964732639141992726042699227967823547816360093417216412199245863150302861829745557067498385054945885869269956909272107975093029553211653449872027559602364806654991198818347977535663698074265425278625518184175746728909777727938000816470600161452491921732172147723501414419735685481613611573525521334757418494684385233239073941433345477624168625189835694855620992192221842725502542568876717904946016534668049886272327917860857843838279679766814541009538837863609506800642251252051173929848960841284886269456042419652850222106611863067442786220391949450471237137869609563643719172874677646575739624138908658326459958133904780275901';

    let piTimeouts=[], piRunning=false, piStartIdx=0, piDirection='forward';
    const SEQ_LEN=5, PAUSE_AFTER=5000;
    let DIG_INT=5000;
    const piStartBtn=document.getElementById('pi-start');
    const piStopBtn=document.getElementById('pi-stop');
    const piStatusEl=document.getElementById('pi-status');
    const piShowCtx=document.getElementById('pi-show-context');
    const piCtxBox=document.getElementById('pi-context-box');
    const piDirSel=document.getElementById('pi-direction');

    piShowCtx.addEventListener('change',()=>{ piCtxBox.style.display=piShowCtx.checked?'block':'none'; });
    piStartBtn.addEventListener('click',startPi);
    piStopBtn.addEventListener('click',stopPi);

    function startPi() {
        stopPi();
        const maxStart=PI_DIGITS.length-SEQ_LEN-10;
        piStartIdx=10+Math.floor(Math.random()*(maxStart-10));
        const dirVal=piDirSel.value;
        piDirection=dirVal==='random'?(Math.random()<0.5?'forward':'backward'):dirVal;
        const seq=PI_DIGITS.slice(piStartIdx,piStartIdx+SEQ_LEN).split('');
        const readSeq=piDirection==='backward'?[...seq].reverse():seq;
        piRunning=true;
        piStartBtn.style.display='none'; piStopBtn.style.display='block';
        renderPiContext(piStartIdx,false);
        let delay=0;
        readSeq.forEach(digit=>{
            piTimeouts.push(setTimeout(()=>{ piStatusEl.textContent=digit; speak(digit); },delay));
            delay+=2000;
        });
        piTimeouts.push(setTimeout(()=>{
            const dirText=piDirection==='forward'?'Vorw\u00e4rts':'R\u00fcckw\u00e4rts';
            piStatusEl.textContent=dirText; speak(dirText);
            renderPiContext(piStartIdx,true);
        },delay+PAUSE_AFTER));
        let nextIdx=piDirection==='forward'?piStartIdx+SEQ_LEN:piStartIdx-1;
        let contDelay=delay+PAUSE_AFTER+DIG_INT;
        for(let i=0;i<20;i++){
            const idx=nextIdx;
            if(idx<0||idx>=PI_DIGITS.length) break;
            const digit=PI_DIGITS[idx];
            piTimeouts.push(setTimeout(()=>{ if(!piRunning)return; piStatusEl.textContent=digit; speak(digit); },contDelay));
            nextIdx=piDirection==='forward'?nextIdx+1:nextIdx-1;
            contDelay+=DIG_INT;
        }
    }
    function stopPi() {
        piRunning=false; piTimeouts.forEach(t=>clearTimeout(t)); piTimeouts=[];
        window.speechSynthesis.cancel();
        piStatusEl.textContent='Bereit.';
        piStartBtn.style.display='block'; piStopBtn.style.display='none';
    }
    function renderPiContext(startIdx, highlight) {
        const from=Math.max(0,startIdx-10), to=Math.min(PI_DIGITS.length,startIdx+SEQ_LEN+10);
        const chunk=PI_DIGITS.slice(from,to);
        let html=`<div style="font-size:12px;color:var(--text-color-light);margin-bottom:6px;">Position ${startIdx+1}\u2013${startIdx+SEQ_LEN} (von 10.000)</div>`;
        for(let i=0;i<chunk.length;i++){
            const absIdx=from+i, inSeq=absIdx>=startIdx&&absIdx<startIdx+SEQ_LEN;
            html+=inSeq&&highlight?`<span style="color:#dc3545;font-weight:bold;">${chunk[i]}</span>`:chunk[i];
        }
        piCtxBox.innerHTML=html;
    }

    // KREDITKARTE
    (function(){
        const CARD_TYPES = [
            {name:'Visa', prefix:['4'], len:16},
            {name:'Mastercard', prefix:['51','52','53','54','55'], len:16},
            {name:'Amex', prefix:['34','37'], len:15},
            {name:'Discover', prefix:['6011'], len:16}
        ];

        let ccNumber = '';      // full valid number
        let ccMasked = '';      // with one digit removed
        let ccMissingIdx = -1;
        let ccMissingDigit = '';
        let ccPhase = 0;        // 0=ready, 1=generated, 2=reading, 3=revealed
        let ccTimeouts = [];

        const mainBtn = document.getElementById('cc-main-btn');
        const resetBtn = document.getElementById('cc-reset-btn');
        const statusEl = document.getElementById('cc-status');
        const answerBox = document.getElementById('cc-answer-box');
        const answerEl = document.getElementById('cc-answer');
        const showNumChk = document.getElementById('cc-show-number');
        const numberBox = document.getElementById('cc-number-box');

        showNumChk.addEventListener('change', () => {
            numberBox.style.display = showNumChk.checked ? 'block' : 'none';
        });
        mainBtn.addEventListener('click', handleMainBtn);
        resetBtn.addEventListener('click', resetCC);

        function luhn(digits) {
            let sum = 0;
            let odd = true;
            for (let i = digits.length - 1; i >= 0; i--) {
                let d = parseInt(digits[i]);
                if (!odd) { d *= 2; if (d > 9) d -= 9; }
                sum += d;
                odd = !odd;
            }
            return sum % 10 === 0;
        }

        function generateCard() {
            const type = CARD_TYPES[Math.floor(Math.random() * CARD_TYPES.length)];
            const prefix = type.prefix[Math.floor(Math.random() * type.prefix.length)];
            const len = type.len;
            let digits = prefix.split('');
            while (digits.length < len - 1) digits.push(String(Math.floor(Math.random()*10)));
            // calc check digit
            for (let check = 0; check <= 9; check++) {
                const candidate = digits.concat([String(check)]);
                if (luhn(candidate)) { digits = candidate; break; }
            }
            return { number: digits.join(''), type: type.name };
        }

        function formatCard(num, missingIdx) {
            // group into blocks of 4 (or 4-6-5 for Amex 15)
            let html = '';
            for (let i = 0; i < num.length; i++) {
                if (i > 0 && i % 4 === 0) html += ' ';
                if (i === missingIdx) {
                    html += `<span style="color:#ff6b6b;font-weight:bold;">?</span>`;
                } else {
                    html += `<span style="color:white;">${num[i]}</span>`;
                }
            }
            return html;
        }

        function handleMainBtn() {
            if (ccPhase === 0) {
                // Generate
                const card = generateCard();
                ccNumber = card.number;
                ccMissingIdx = Math.floor(Math.random() * ccNumber.length);
                ccMissingDigit = ccNumber[ccMissingIdx];
                ccPhase = 1;
                answerBox.style.display = 'none';
                numberBox.innerHTML = formatCard(ccNumber, ccMissingIdx);
                if (showNumChk.checked) numberBox.style.display = 'block';
                statusEl.textContent = `${card.type} \u2013 Bereit zum Vorlesen. Welche Ziffer fehlt?`;
                mainBtn.textContent = 'Vorlesen starten';
            } else if (ccPhase === 1) {
                // Start reading
                ccPhase = 2;
                mainBtn.disabled = true;
                const delay = (parseInt(document.getElementById('cc-delay').value) || 3) * 1000;
                // build full sequence with null at missing position
                const fullSeq = ccNumber.split('');
                let d = 0;
                ccTimeouts = [];
                statusEl.textContent = 'Lese vor...';
                fullSeq.forEach((digit, i) => {
                    ccTimeouts.push(setTimeout(() => {
                        if (i === ccMissingIdx) {
                            statusEl.textContent = '?';
                            beep();
                        } else {
                            statusEl.textContent = digit;
                            speak(digit);
                        }
                        if (i === fullSeq.length - 1) {
                            ccTimeouts.push(setTimeout(() => {
                                statusEl.textContent = 'Welche Ziffer fehlt?';
                                mainBtn.textContent = 'L\u00f6sung anzeigen';
                                mainBtn.disabled = false;
                                ccPhase = 3;
                            }, delay));
                        }
                    }, d));
                    d += delay;
                });
            } else if (ccPhase === 3) {
                // Reveal
                answerEl.textContent = ccMissingDigit;
                answerBox.style.display = 'block';
                statusEl.textContent = `Die fehlende Ziffer war die ${ccMissingIdx+1}. Stelle.`;
                speak(ccMissingDigit);
                mainBtn.disabled = true;
                mainBtn.textContent = 'Karte generieren';
            }
        }

        function resetCC() {
            ccTimeouts.forEach(t => clearTimeout(t)); ccTimeouts = [];
            window.speechSynthesis.cancel();
            ccPhase = 0;
            ccNumber = ''; ccMissingIdx = -1; ccMissingDigit = '';
            statusEl.textContent = 'Bereit.';
            mainBtn.textContent = 'Karte generieren';
            mainBtn.disabled = false;
            answerBox.style.display = 'none';
            numberBox.innerHTML = '';
            if (!showNumChk.checked) numberBox.style.display = 'none';
        }
    })();

});

function openTab(evt,tabName) {
    document.querySelectorAll('.tab-pane').forEach(p=>p.style.display='none');
    document.querySelectorAll('.tab-button').forEach(b=>b.classList.remove('active'));
    document.getElementById(tabName).style.display='block';
    evt.currentTarget.classList.add('active');
}
</script>
</body>
