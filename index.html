<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synaptic Tester</title>
    <style>
        :root {
            --ease: all 0.2s ease-in-out;
        }

        body[data-theme='light'] {
            --page-bg: #f4f4f9;
            --text-color: #333;
            --text-color-light: #555;
            --app-bg: white;
            --app-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            --tabs-bg: #e9ecef;
            --tab-text: #495057;
            --tab-active-text: #007bff;
            --tab-active-bg: white;
            --tab-active-border: #007bff;
            --input-bg: white;
            --input-border: #ced4da;
            --display-bg: #e9ecef;
            --display-text: #333;
            --btn-primary-bg: #007bff;
            --btn-primary-hover: #0056b3;
            --btn-secondary-bg: #6c757d;
            --btn-secondary-hover: #5a6268;
            --btn-disabled-bg: #adb5bd;
            --speech-settings-bg: #f9f9f9;
            --speech-settings-border: #ddd;
            --theme-toggle-bg: #e9ecef;
            --theme-toggle-hover: #d1d9e0;
            --theme-toggle-icon: '☀️';
        }

        body[data-theme='dark'] {
            --page-bg: #1a1a1a;
            --text-color: #e0e0e0;
            --text-color-light: #aaa;
            --app-bg: #2c2c2c;
            --app-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
            --tabs-bg: #222;
            --tab-text: #bbb;
            --tab-active-text: #4dabf7;
            --tab-active-bg: #2c2c2c;
            --tab-active-border: #4dabf7;
            --input-bg: #333;
            --input-border: #555;
            --display-bg: #222;
            --display-text: #e0e0e0;
            --btn-primary-bg: #007bff;
            --btn-primary-hover: #0056b3;
            --btn-secondary-bg: #5a6268;
            --btn-secondary-hover: #495057;
            --btn-disabled-bg: #444;
            --speech-settings-bg: #333;
            --speech-settings-border: #444;
            --theme-toggle-bg: #333;
            --theme-toggle-hover: #444;
            --theme-toggle-icon: '🌙';
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--page-bg);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding-top: 40px;
            transition: var(--ease);
        }

        .app-container {
            background-color: var(--app-bg);
            border-radius: 12px;
            box-shadow: var(--app-shadow);
            width: 90%;
            max-width: 550px; /* Adjusted for wider game board */
            overflow: hidden;
            transition: var(--ease);
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: var(--tabs-bg);
            font-weight: bold;
            font-size: 18px;
            transition: var(--ease);
        }

        #theme-toggle {
            background-color: var(--theme-toggle-bg);
            border: 1px solid var(--input-border);
            border-radius: 20px;
            cursor: pointer;
            padding: 5px 10px;
            font-size: 14px;
            transition: var(--ease);
        }
        #theme-toggle:hover {
            background-color: var(--theme-toggle-hover);
        }
        #theme-toggle::after {
            content: var(--theme-toggle-icon);
            padding-left: 5px;
        }

        .tabs {
            display: flex;
            background-color: var(--tabs-bg);
            transition: var(--ease);
        }
        .tab-button {
            padding: 15px 20px;
            border: none;
            background-color: transparent;
            cursor: pointer;
            font-size: 16px;
            color: var(--tab-text);
            flex-grow: 1;
            font-weight: 500;
            border-bottom: 3px solid transparent;
            transition: var(--ease);
        }
        .tab-button.active {
            background-color: var(--tab-active-bg);
            color: var(--tab-active-text);
            border-bottom-color: var(--tab-active-border);
            font-weight: 600;
        }
        .tab-content {
            padding: 25px;
        }
        .tab-pane {
            display: none;
        }
        .tab-pane.active {
            display: block;
        }
        h2 {
            margin-top: 0;
            color: var(--tab-active-text);
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-color-light);
        }
        .input-group input[type="date"], .input-group input[type="number"], .input-group select {
            width: calc(100% - 22px);
            padding: 10px;
            border: 1px solid var(--input-border);
            border-radius: 6px;
            font-size: 16px;
            background-color: var(--input-bg);
            color: var(--text-color);
            transition: var(--ease);
        }
        .input-group input[type="number"] {
             width: 80%;
             padding: 5px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            cursor: pointer;
        }
        .checkbox-group input {
            margin-right: 10px;
            width: 16px;
            height: 16px;
            accent-color: var(--tab-active-text);
        }
        .checkbox-group label {
            cursor: pointer;
        }
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }
        button {
            padding: 12px 15px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            color: white;
        }
        button:disabled {
            background-color: var(--btn-disabled-bg);
            cursor: not-allowed;
            color: #999;
        }
        button:active:not(:disabled) {
            transform: scale(0.98);
        }
        #btn-generate, #btn-next {
            background-color: var(--btn-primary-bg);
        }
        #btn-reset {
            background-color: var(--btn-secondary-bg);
        }
        #btn-generate:hover, #btn-next:hover:not(:disabled) {
            background-color: var(--btn-primary-hover);
        }
        #btn-reset:hover {
            background-color: var(--btn-secondary-hover);
        }
        #display-area {
            margin-top: 25px;
            padding: 20px;
            background-color: var(--display-bg);
            border-radius: 6px;
            min-height: 50px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            color: var(--display-text);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: var(--ease);
        }
        #speech-settings {
            display: none;
            border: 1px solid var(--speech-settings-border);
            padding: 15px;
            border-radius: 6px;
            margin-top: 10px;
            background-color: var(--speech-settings-bg);
            transition: var(--ease);
        }
        #speech-settings h4 {
            margin-top: 0; margin-bottom: 15px; font-size: 16px;
        }
        #speech-settings .grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
        }
        #speech-settings .input-group {
            font-size: 14px; margin-bottom: 5px;
        }

        /* --- VIER GEWINNT STYLES --- */
        .vier-gewinnt-controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        #vier-gewinnt-status {
            margin: 20px 0;
            padding: 15px;
            background-color: var(--display-bg);
            border-radius: 6px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            color: var(--display-text);
            min-height: 2em;
        }
        #vier-gewinnt-column-buttons {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            margin-bottom: 10px;
        }
        .column-btn {
            background-color: var(--btn-secondary-bg);
            aspect-ratio: 1;
            font-size: 24px;
            line-height: 1;
        }
        .column-btn:hover {
            background-color: var(--btn-secondary-hover);
        }
        #vier-gewinnt-board {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            background-color: #007bff;
            padding: 10px;
            border-radius: 10px;
            border: 5px solid #0056b3;
        }
        .cell {
            aspect-ratio: 1;
            background-color: var(--app-bg);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            transform: translateZ(0);
        }
        .cell .piece {
            width: 85%;
            height: 85%;
            border-radius: 50%;
            animation: drop 0.3s ease-out;
        }
        .cell .piece.player1 {
            background-color: #ffc107; /* Gelb */
            box-shadow: inset 0 -4px 5px rgba(0,0,0,0.2);
        }
        .cell .piece.player2 {
            background-color: #dc3545; /* Rot */
            box-shadow: inset 0 -4px 5px rgba(0,0,0,0.2);
        }
        .cell.win .piece {
            animation: pulse 0.6s infinite;
        }

        @keyframes drop {
            from {
                transform: translateY(-200px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        @keyframes pulse {
            0% { transform: scale(0.9); }
            50% { transform: scale(1.1); }
            100% { transform: scale(0.9); }
        }

    </style>
</head>
<body>

    <div class="app-container">
        <div class="app-header">
            <span>Synaptic Tester v1.2</span>
            <button id="theme-toggle" title="Toggle Theme"></button>
        </div>
        <div class="tabs">
            <button class="tab-button active" onclick="openTab(event, 'date-function')">Calendar Prodigy</button>
            <button class="tab-button" onclick="openTab(event, 'vier-gewinnt')">Vier Gewinnt</button>
        </div>

        <div id="date-function" class="tab-content tab-pane active">
            <h2>Zufälliges Datum</h2>
            <div id="setup-view">
                <div class="input-group">
                    <label for="start-date">Anfangsdatum</label>
                    <input type="date" id="start-date" value="1950-01-01">
                </div>
                <div class="input-group">
                    <label for="end-date">Enddatum</label>
                    <input type="date" id="end-date">
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="show-zodiac">
                    <label for="show-zodiac">Optional: Sternzeichen anzeigen</label>
                </div>
                <div class="checkbox-group" style="margin-top: 20px;">
                    <input type="checkbox" id="enable-speech">
                    <label for="enable-speech">Sprachausgabe aktivieren</label>
                </div>
                <div id="speech-settings">
                    <h4>Pausen für Sprachausgabe (Sekunden)</h4>
                    <div class="grid">
                        <div class="input-group">
                            <label for="delay-initial">Start</label>
                            <input type="number" id="delay-initial" value="5" min="0">
                        </div>
                        <div class="input-group">
                            <label for="delay-year-month">nach Jahr</label>
                            <input type="number" id="delay-year-month" value="10" min="0">
                        </div>
                        <div class="input-group">
                            <label for="delay-month-day">nach Monat</label>
                            <input type="number" id="delay-month-day" value="10" min="0">
                        </div>
                        <div class="input-group">
                            <label for="delay-day-weekday">nach Tag</label>
                            <input type="number" id="delay-day-weekday" value="10" min="0">
                        </div>
                        <div class="input-group">
                            <label for="delay-weekday-days">nach Wochentag</label>
                            <input type="number" id="delay-weekday-days" value="10" min="0">
                        </div>
                        <div class="input-group">
                            <label for="delay-digit">zw. Ziffern</label>
                            <input type="number" id="delay-digit" value="3" min="0">
                        </div>
                    </div>
                </div>
                 <button id="btn-generate" style="width: 100%; margin-top: 20px;">Zufälliges Datum generieren</button>
            </div>

            <div id="result-view" style="display: none;">
                <div id="display-area">Warte auf Eingabe...</div>
                <div class="button-group">
                    <button id="btn-next">Nächster Schritt</button>
                    <button id="btn-reset">Zurücksetzen</button>
                </div>
            </div>
        </div>

        <div id="vier-gewinnt" class="tab-content tab-pane">
            <h2>Vier Gewinnt</h2>
            <div class="vier-gewinnt-controls">
                <div class="input-group">
                    <label for="vier-gewinnt-starter">Wer beginnt?</label>
                    <select id="vier-gewinnt-starter">
                        <option value="user">Benutzer</option>
                        <option value="app" selected>App</option>
                    </select>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="vier-gewinnt-show-board">
                    <label for="vier-gewinnt-show-board">Spielfeld anzeigen</label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="vier-gewinnt-speech">
                    <label for="vier-gewinnt-speech">Sprachausgabe für App</label>
                </div>
            </div>

            <div id="vier-gewinnt-status">Wähle die Optionen und starte eine neue Runde.</div>
            <div id="vier-gewinnt-column-buttons"></div>
            <div id="vier-gewinnt-board"></div>

            <button id="vier-gewinnt-reset" style="width: 100%; margin-top: 20px; background-color: #343a40; color: #ffffff;">Neues Spiel</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- THEME ---
            const themeToggleBtn = document.getElementById('theme-toggle');
            const body = document.body;

            function setAndStoreTheme(theme) {
                body.setAttribute('data-theme', theme);
                themeToggleBtn.textContent = theme === 'dark' ? 'Light' : 'Dark';
                try {
                    localStorage.setItem('synaptic-theme', theme);
                } catch (e) {
                    console.warn("LocalStorage is not available.");
                }
            }

            themeToggleBtn.addEventListener('click', () => {
                const currentTheme = body.getAttribute('data-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                setAndStoreTheme(newTheme);
            });
            
            let storedTheme;
            try {
                 storedTheme = localStorage.getItem('synaptic-theme');
            } catch (e) {
                console.warn("LocalStorage is not available.");
            }
            setAndStoreTheme(storedTheme || 'dark');

            // --- GENERAL ---
            function speak(text, lang = 'de-DE') {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel(); 
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = lang;
                    window.speechSynthesis.speak(utterance);
                }
            }


            // --- CALENDAR PRODIGY LOGIC ---
            const today = new Date();
            const todayString = today.toISOString().split('T')[0];
            document.getElementById('end-date').value = todayString;
            
            let currentStep = 0;
            let randomDate = null;
            let speechTimeouts = [];
            const todayDateOnly = new Date(today.getFullYear(), today.getMonth(), today.getDate());

            const btnGenerate = document.getElementById('btn-generate');
            const btnNext = document.getElementById('btn-next');
            const btnReset = document.getElementById('btn-reset');
            const displayArea = document.getElementById('display-area');
            const setupView = document.getElementById('setup-view');
            const resultView = document.getElementById('result-view');
            const enableSpeechCheck = document.getElementById('enable-speech');
            const speechSettings = document.getElementById('speech-settings');

            btnGenerate.addEventListener('click', generateRandomDate);
            btnNext.addEventListener('click', showNextStep);
            btnReset.addEventListener('click', resetApp);
            enableSpeechCheck.addEventListener('change', () => {
                speechSettings.style.display = enableSpeechCheck.checked ? 'block' : 'none';
                if (!enableSpeechCheck.checked) {
                    clearAllTimeouts();
                }
            });

            function generateRandomDate() {
                const startDateStr = document.getElementById('start-date').value;
                const endDateStr = document.getElementById('end-date').value;
                if (!startDateStr || !endDateStr) {
                    alert('Bitte geben Sie ein Anfangs- und Enddatum an.');
                    return;
                }
                const startDate = new Date(startDateStr);
                const endDate = new Date(endDateStr);
                if (startDate >= endDate) {
                    alert('Das Anfangsdatum muss vor dem Enddatum liegen.');
                    return;
                }
                const startMillis = startDate.getTime();
                const endMillis = endDate.getTime();
                randomDate = new Date(startMillis + Math.random() * (endMillis - startMillis));
                
                currentStep = 0;
                setupView.style.display = 'none';
                resultView.style.display = 'block';
                btnNext.disabled = false;

                if (enableSpeechCheck.checked) {
                    startSpeechSequence();
                } else {
                    displayArea.innerHTML = `Bereit!<br><small style="font-size: 14px; font-weight: normal; color: var(--text-color-light);">Klicke auf "Nächster Schritt"</small>`;
                    btnNext.textContent = 'Nächster Schritt';
                }
            }

            function startSpeechSequence() {
                btnNext.disabled = true;
                displayArea.textContent = 'Sprachausgabe startet...';

                const delays = {
                    initial: parseInt(document.getElementById('delay-initial').value) * 1000,
                    yearMonth: parseInt(document.getElementById('delay-year-month').value) * 1000,
                    monthDay: parseInt(document.getElementById('delay-month-day').value) * 1000,
                    dayWeekday: parseInt(document.getElementById('delay-day-weekday').value) * 1000,
                    weekdayDays: parseInt(document.getElementById('delay-weekday-days').value) * 1000,
                    digit: parseInt(document.getElementById('delay-digit').value) * 1000
                };

                const year = randomDate.getFullYear().toString();
                const month = randomDate.toLocaleString('de-DE', { month: 'long' });
                const day = randomDate.getDate().toString();
                const weekday = randomDate.toLocaleString('de-DE', { weekday: 'long' });
                const timeDiff = todayDateOnly.getTime() - new Date(randomDate.getFullYear(), randomDate.getMonth(), randomDate.getDate()).getTime();
                const dayDiff = Math.floor(timeDiff / (1000 * 3600 * 24));
                const dayDiffStr = dayDiff.toString();
                const zodiac = getZodiacSign(randomDate);
                const showZodiac = document.getElementById('show-zodiac').checked;

                let cumulativeDelay = 0;
                clearAllTimeouts();

                const sequence = [
                    { delay: delays.initial, text: year, html: year },
                    { delay: delays.yearMonth, text: month, html: month },
                    { delay: delays.monthDay, text: day, html: day },
                    { delay: delays.dayWeekday, text: weekday, html: weekday },
                    { delay: delays.weekdayDays, text: ``, html: `${dayDiff}<br><small style='font-size:14px; color: var(--text-color-light);'>Tage vergangen</small>` }
                ];

                sequence.forEach(step => {
                    cumulativeDelay += step.delay;
                    speechTimeouts.push(setTimeout(() => {
                        displayArea.innerHTML = step.html;
                        if(step.text && enableSpeechCheck.checked) speak(step.text);
                    }, cumulativeDelay));
                });
                
                let digitDelay = cumulativeDelay;
                dayDiffStr.split('').forEach(digit => {
                    digitDelay += delays.digit;
                    speechTimeouts.push(setTimeout(() => { if(enableSpeechCheck.checked) speak(digit); }, digitDelay));
                });
                cumulativeDelay = digitDelay;

                if (showZodiac) {
                     cumulativeDelay += (delays.weekdayDays > delays.digit * dayDiffStr.length) ? delays.weekdayDays : delays.digit * dayDiffStr.length + 2000;
                     speechTimeouts.push(setTimeout(() => {
                        displayArea.textContent = zodiac;
                        if(enableSpeechCheck.checked) speak(zodiac);
                     }, cumulativeDelay));
                }
                
                speechTimeouts.push(setTimeout(endSequence, cumulativeDelay + 2000));
            }
            
            function showNextStep() {
                currentStep++;
                const showZodiac = document.getElementById('show-zodiac').checked;
                let isLastStep = false;
                let content = '';
                let subtext = '';

                switch(currentStep) {
                    case 1: content = randomDate.getFullYear(); break;
                    case 2: content = randomDate.toLocaleString('de-DE', { month: 'long' }); break;
                    case 3: content = randomDate.getDate(); break;
                    case 4: content = randomDate.toLocaleString('de-DE', { weekday: 'long' }); break;
                    case 5: 
                        const timeDiff = todayDateOnly.getTime() - new Date(randomDate.getFullYear(), randomDate.getMonth(), randomDate.getDate()).getTime();
                        const dayDiff = Math.floor(timeDiff / (1000 * 3600 * 24));
                        content = dayDiff;
                        subtext = 'Tage vergangen';
                        if (!showZodiac) isLastStep = true;
                        break;
                    case 6:
                        if (showZodiac) { content = getZodiacSign(randomDate); isLastStep = true; } 
                        else { endSequence(); return; }
                        break;
                    default: endSequence(); return;
                }
                displayArea.innerHTML = `${content}<br><small style='font-size:14px; font-weight:normal; color: var(--text-color-light);'>${subtext}</small>`;

                if (isLastStep) {
                    btnNext.textContent = "Fertig";
                    btnNext.disabled = true;
                }
            }
            
            function endSequence() {
                 displayArea.innerHTML = 'Sequenz beendet.<br><small style="font-size: 14px; font-weight: normal; color: var(--text-color-light);">Auf "Zurücksetzen" klicken.</small>';
                 btnNext.disabled = true;
                 btnNext.textContent = 'Nächster Schritt';
            }

            function clearAllTimeouts() {
                speechTimeouts.forEach(timeout => clearTimeout(timeout));
                speechTimeouts = [];
                window.speechSynthesis.cancel();
            }

            function resetApp() {
                clearAllTimeouts();
                currentStep = 0;
                randomDate = null;
                setupView.style.display = 'block';
                resultView.style.display = 'none';
                displayArea.textContent = 'Warte auf Eingabe...';
                btnNext.disabled = false;
                btnNext.textContent = "Nächster Schritt";
            }

            function getZodiacSign(date) {
                const day = date.getDate();
                const month = date.getMonth() + 1;
                if ((month == 1 && day >= 21) || (month == 2 && day <= 19)) return "Wassermann";
                if ((month == 2 && day >= 20) || (month == 3 && day <= 20)) return "Fische";
                if ((month == 3 && day >= 21) || (month == 4 && day <= 20)) return "Widder";
                if ((month == 4 && day >= 21) || (month == 5 && day <= 20)) return "Stier";
                if ((month == 5 && day >= 21) || (month == 6 && day <= 21)) return "Zwillinge";
                if ((month == 6 && day >= 22) || (month == 7 && day <= 22)) return "Krebs";
                if ((month == 7 && day >= 23) || (month == 8 && day <= 23)) return "Löwe";
                if ((month == 8 && day >= 24) || (month == 9 && day <= 23)) return "Jungfrau";
                if ((month == 9 && day >= 24) || (month == 10 && day <= 23)) return "Waage";
                if ((month == 10 && day >= 24) || (month == 11 && day <= 22)) return "Skorpion";
                if ((month == 11 && day >= 23) || (month == 12 && day <= 21)) return "Schütze";
                if ((month == 12 && day >= 22) || (month == 1 && day <= 20)) return "Steinbock";
            }

            // --- VIER GEWINNT LOGIC ---
            const ROWS = 6;
            const COLS = 7;
            const PLAYER1 = 'user';
            const PLAYER2 = 'app';

            let board = [];
            let lastWinDirection = '';
            let currentPlayer;
            let gameOver = false;
            let lastMove = null;

            const boardElement = document.getElementById('vier-gewinnt-board');
            const columnButtonsElement = document.getElementById('vier-gewinnt-column-buttons');
            const statusElement = document.getElementById('vier-gewinnt-status');
            const resetBtn = document.getElementById('vier-gewinnt-reset');
            const starterSelect = document.getElementById('vier-gewinnt-starter');
            const showBoardCheck = document.getElementById('vier-gewinnt-show-board');
            const speechCheck = document.getElementById('vier-gewinnt-speech');
            
            resetBtn.addEventListener('click', initVierGewinnt);
            showBoardCheck.addEventListener('change', () => {
                boardElement.style.display = showBoardCheck.checked ? 'grid' : 'none';
            });

            function initVierGewinnt() {
                gameOver = false;
                lastMove = null;
                currentPlayer = starterSelect.value;
                board = Array(ROWS).fill(null).map(() => Array(COLS).fill(null));
                
                renderBoard();
                renderColumnButtons();

                statusElement.textContent = `Spiel gestartet. ${currentPlayer === PLAYER1 ? 'Du bist' : 'Die App ist'} am Zug.`;

                if (currentPlayer === PLAYER2) {
                    disableColumnButtons(true);
                    setTimeout(appMove, 1000);
                } else {
                    disableColumnButtons(false);
                }
            }

            function renderBoard() {
                boardElement.innerHTML = '';
                boardElement.style.display = showBoardCheck.checked ? 'grid' : 'none';
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        const cell = document.createElement('div');
                        cell.classList.add('cell');
                        cell.dataset.row = r;
                        cell.dataset.col = c;
                        if (board[r][c]) {
                            const piece = document.createElement('div');
                            piece.classList.add('piece', board[r][c] === PLAYER1 ? 'player1' : 'player2');
                            // Do not add 'drop' animation on re-render
                            cell.appendChild(piece);
                        }
                        boardElement.appendChild(cell);
                    }
                }
            }
            
            function renderColumnButtons() {
                columnButtonsElement.innerHTML = '';
                for (let c = 0; c < COLS; c++) {
                    const btn = document.createElement('button');
                    btn.classList.add('column-btn');
                    btn.dataset.col = c;
                    btn.textContent = '↓ ' + (c + 1);
                    btn.addEventListener('click', handleColumnClick);
                    columnButtonsElement.appendChild(btn);
                }
            }

            function handleColumnClick(event) {
                if (gameOver || currentPlayer !== PLAYER1) return;
                const col = parseInt(event.target.dataset.col);
                const row = findLowestEmptyRow(col);

                if (row !== -1) {
                    dropPiece(row, col, PLAYER1);
                }
            }

            function dropPiece(row, col, player) {
                board[row][col] = player;
                lastMove = { row, col, player };
                
                // UI Update
                const cell = boardElement.querySelector(`.cell[data-row='${row}'][data-col='${col}']`);
                const piece = document.createElement('div');
                piece.classList.add('piece', player === PLAYER1 ? 'player1' : 'player2');
                cell.appendChild(piece);
                
                if (checkWin(player)) {
                    endGame(player);
                    return;
                }
                
                if (isBoardFull()) {
                    endGame(null); // Unentschieden
                    return;
                }

                switchPlayer();
            }
            
            function findLowestEmptyRow(col) {
                for (let r = ROWS - 1; r >= 0; r--) {
                    if (board[r][col] === null) {
                        return r;
                    }
                }
                return -1; // Spalte ist voll
            }

            function switchPlayer() {
                currentPlayer = (currentPlayer === PLAYER1) ? PLAYER2 : PLAYER1;
                statusElement.textContent = `${currentPlayer === PLAYER1 ? 'Du bist' : 'Die App ist'} am Zug.`;
                
                if (currentPlayer === PLAYER2) {
                    disableColumnButtons(true);
                    setTimeout(appMove, 1200); // Kurze Pause bevor die App zieht
                } else {
                    disableColumnButtons(false);
                }
            }

            function appMove() {
                if (gameOver) return;
                let availableCols = [];
                for (let c = 0; c < COLS; c++) {
                    if (board[0][c] === null) {
                        availableCols.push(c);
                    }
                }

                if (availableCols.length > 0) {
                    const col = availableCols[Math.floor(Math.random() * availableCols.length)];
                    const row = findLowestEmptyRow(col);
                    if (speechCheck.checked) {
                        speak(`Ich setze in Spalte ${col + 1}.`);
                    }
                    dropPiece(row, col, PLAYER2);
                }
            }

            function checkWin(player) {
                const checkLine = (a, b, c, d) => {
                    return (a !== null && a === b && a === c && a === d);
                };

                // Horizontal
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c <= COLS - 4; c++) {
                        if (checkLine(board[r][c], board[r][c+1], board[r][c+2], board[r][c+3]) && board[r][c] === player) {
                            lastWinDirection = 'Horizontal.';
                            highlightWinningCells([[r,c],[r,c+1],[r,c+2],[r,c+3]]);
                            return true;
                        }
                    }
                }
                // Vertical
                for (let c = 0; c < COLS; c++) {
                    for (let r = 0; r <= ROWS - 4; r++) {
                        if (checkLine(board[r][c], board[r+1][c], board[r+2][c], board[r+3][c]) && board[r][c] === player) {
                            lastWinDirection = 'Vertikal.';
                            highlightWinningCells([[r,c],[r+1,c],[r+2,c],[r+3,c]]);
                            return true;
                        }
                    }
                }
                // Diagonal (down-right)
                for (let r = 0; r <= ROWS - 4; r++) {
                    for (let c = 0; c <= COLS - 4; c++) {
                        if (checkLine(board[r][c], board[r+1][c+1], board[r+2][c+2], board[r+3][c+3]) && board[r][c] === player) {
                            lastWinDirection = 'Diagonal.';
                            highlightWinningCells([[r,c],[r+1,c+1],[r+2,c+2],[r+3,c+3]]);
                            return true;
                        }
                    }
                }
                // Diagonal (up-right)
                for (let r = 3; r < ROWS; r++) {
                    for (let c = 0; c <= COLS - 4; c++) {
                        if (checkLine(board[r][c], board[r-1][c+1], board[r-2][c+2], board[r-3][c+3]) && board[r][c] === player) {
                            lastWinDirection = 'Diagonal.';
                            highlightWinningCells([[r,c],[r-1,c+1],[r-2,c+2],[r-3,c+3]]);
                            return true;
                        }
                    }
                }
                return false;
            }

            function highlightWinningCells(cells) {
                 cells.forEach(([r, c]) => {
                    const cell = boardElement.querySelector(`.cell[data-row='${r}'][data-col='${c}']`);
                    if(cell) cell.classList.add('win');
                });
            }
            
            function isBoardFull() {
                return board[0].every(cell => cell !== null);
            }

            function endGame(winner) {
                gameOver = true;
                disableColumnButtons(true);
                let message = '';
                if (winner) {
                    const winnerName = winner === PLAYER1 ? 'Du hast' : 'Die App hat';
                    message = `${winnerName} gewonnen! ${lastWinDirection}`;
                    statusElement.textContent = message;
                    if (speechCheck.checked) {
                        speak(message);
                    }
                } else {
                    message = 'Unentschieden!';
                    statusElement.textContent = message;
                    if (speechCheck.checked) speak(message);
                }
            }
            
            function disableColumnButtons(disabled) {
                 const buttons = columnButtonsElement.querySelectorAll('.column-btn');
                 buttons.forEach(btn => btn.disabled = disabled);
            }
            
            initVierGewinnt(); // Initialize on load
        });

        function openTab(evt, tabName) {
            let i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tab-pane");
            for (i = 0; i < tabcontent.length; i++) tabcontent[i].style.display = "none";
            tablinks = document.getElementsByClassName("tab-button");
            for (i = 0; i < tablinks.length; i++) tablinks[i].className = tablinks[i].className.replace(" active", "");
            document.getElementById(tabName).style.display = "block";
            evt.currentTarget.className += " active";
        }
    </script>
</body>
</html>
