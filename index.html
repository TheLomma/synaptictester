<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SynaTest v7.9</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SynaTest">
<meta name="theme-color" content="#030810">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--ease:all 0.3s cubic-bezier(0.25,0.46,0.45,0.94);--glass-bg:rgba(12,12,30,0.52);--glass-border:rgba(255,255,255,0.14);--glass-border-top:rgba(255,255,255,0.32);--glass-shadow:0 32px 80px rgba(0,0,0,0.75),0 8px 24px rgba(0,0,0,0.5);--glass-blur:blur(44px) saturate(210%) brightness(1.06);--glass-btn:rgba(255,255,255,0.09);--glass-btn-hover:rgba(255,255,255,0.24);--glass-input:rgba(255,255,255,0.06);--glass-display:rgba(0,0,0,0.36);--text:rgba(255,255,255,0.92);--text-light:rgba(255,255,255,0.40);--accent:#5ac8fa;--accent2:#bf5af2;--red:#ff6b6b;--green:#30d158;}
body.light-mode{--glass-bg:rgba(255,255,255,0.18);--glass-border-top:rgba(255,255,255,0.50);--glass-border:rgba(255,255,255,0.20);--glass-shadow:0 32px 80px rgba(0,0,0,0.35),0 8px 24px rgba(0,0,0,0.2);--glass-btn:rgba(255,255,255,0.14);--glass-btn-hover:rgba(255,255,255,0.18);--glass-input:rgba(255,255,255,0.12);--glass-display:rgba(255,255,255,0.10);--text:rgba(255,255,255,0.95);--text-light:rgba(255,255,255,0.55);background:radial-gradient(ellipse at 15% 15%,#1a3a6e 0%,transparent 55%),radial-gradient(ellipse at 85% 10%,#2a1a5e 0%,transparent 50%),radial-gradient(ellipse at 50% 90%,#0a2a5a 0%,transparent 50%),linear-gradient(135deg,#0d1f3d 0%,#1a1030 50%,#0d1f3d 100%);}
body{transition:background 0.45s ease,color 0.45s ease;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:24px 16px 60px;background:radial-gradient(ellipse at 18% 18%,#0d3a7a 0%,transparent 52%),radial-gradient(ellipse at 82% 8%,#2d0a6e 0%,transparent 48%),radial-gradient(ellipse at 55% 85%,#04385a 0%,transparent 48%),linear-gradient(145deg,#020710 0%,#050d1e 50%,#020710 100%);}
.app-container{width:100%;max-width:580px;background:var(--glass-bg);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:1px solid var(--glass-border);border-top:1px solid var(--glass-border-top);border-radius:32px;box-shadow:var(--glass-shadow),inset 0 1px 0 rgba(255,255,255,0.22);overflow:hidden;}
.app-header{display:flex;flex-direction:column;gap:10px;padding:14px 16px 12px;background:linear-gradient(180deg,rgba(255,255,255,0.07) 0%,rgba(255,255,255,0.02) 100%);border-bottom:1px solid rgba(255,255,255,0.08);}
.app-header-row1{display:flex;justify-content:center;align-items:center;}
.app-header-row2{display:flex;justify-content:center;gap:8px;}
.app-header-row2 button{flex:1;}
@media(min-width:520px){.app-header{flex-direction:row;justify-content:space-between;align-items:center;padding:16px 22px 14px;gap:0;}.app-header-row1{width:auto;}.app-header-row2{width:auto;}.app-header-row2 button{flex:none;}}
.app-header span{font-size:17px;font-weight:600;color:var(--text);}
#theme-toggle{min-width:68px;background:rgba(255,255,255,0.09);border:1px solid rgba(255,255,255,0.15);border-top:1px solid rgba(255,255,255,0.28);border-radius:22px;color:var(--text);padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;transition:var(--ease);}
#lang-toggle,#mute-toggle,#help-toggle{min-width:40px;background:rgba(255,255,255,0.09);border:1px solid rgba(255,255,255,0.15);border-top:1px solid rgba(255,255,255,0.28);border-radius:22px;color:var(--text);padding:7px 10px;font-size:15px;cursor:pointer;transition:var(--ease);}
#help-modal{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.55);backdrop-filter:blur(28px);justify-content:center;align-items:center;padding:20px;}
#help-modal.open{display:flex;}
#help-modal-inner{width:100%;max-width:560px;max-height:85vh;overflow-y:auto;background:rgba(8,12,36,0.92);border:1px solid rgba(255,255,255,0.14);border-top:1px solid rgba(255,255,255,0.30);border-radius:28px;padding:28px 24px;box-shadow:0 40px 100px rgba(0,0,0,0.9);}
#help-modal-inner h3{font-size:20px;font-weight:800;color:var(--text);margin-bottom:20px;}
.help-item{margin-bottom:12px;padding:16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:18px;}
.help-item-title{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:6px;}
.help-item-text{font-size:13px;color:rgba(255,255,255,0.75);line-height:1.6;}
#help-close{width:100%;margin-top:8px;background:rgba(255,255,255,0.09);border:1px solid rgba(255,255,255,0.15);border-radius:16px;padding:13px;font-size:14px;font-weight:600;color:var(--text);cursor:pointer;}
